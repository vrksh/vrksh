name: moniker
tagline: memorable name generator - run IDs, job labels, temp dirs
meta_description: "Generate memorable names for run IDs, job labels, and temp dirs. No more UUIDs in log output."
og_title: "vrk moniker - memorable name generator for run IDs and labels"
description: |
  `vrk moniker` generates memorable adjective-noun names from embedded wordlists. Deterministic with `--seed` for reproducible names. `--count` for batches, `--words` for longer names when you need more uniqueness. No duplicates within a single batch.
problem: >
  Timestamp labels like `run-20260330-174856` collide when three runs start in the
  same minute. UUIDs are unique but nobody can say "check run 98d06ca5" in an
  incident call. You need identifiers that are both unique and pronounceable.
before: |
  echo "run-$(date +%Y%m%d-%H%M%S)"
  # Identical for concurrent runs, not human-memorable
after: "vrk moniker"
group: v1
category: utilities
example: "vrk moniker --count 5 --seed 42"
flags:
  - flag: --count
    short: "-n"
    type: int
    description: Number of names to generate
  - flag: --separator
    short: ""
    type: string
    description: Word separator
  - flag: --words
    short: ""
    type: int
    description: Words per name (minimum 2)
  - flag: --seed
    short: ""
    type: int64
    description: Random seed for deterministic output
  - flag: --json
    short: "-j"
    type: bool
    description: "Emit JSON per name: {name, words}"
  - flag: --quiet
    short: "-q"
    type: bool
    description: Suppress stderr output
exit_codes:
  - code: 0
    meaning: Success
  - code: 1
    meaning: Word pool exhausted for requested count
  - code: 2
    meaning: --count less than 1, --words less than 2
og_image:
  headline: "Generate memorable names. For pipelines."
  code: "vrk moniker --seed 42"
mcp_callable: true
