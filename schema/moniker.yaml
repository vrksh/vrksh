name: moniker
tagline: memorable name generator - run IDs, job labels, temp dirs
meta_description: "Generate memorable names for run IDs, job labels, and temp dirs. No more UUIDs in log output."
og_title: "vrk moniker - memorable name generator for run IDs and labels"
description: |
  You need human-readable identifiers for pipeline runs, batch jobs, or temporary directories. UUIDs work but nobody can say "check run 98d06ca5-e747-4a63-8fc9-045f0e02f8d4" in a standup. You want something like Docker's container names - "bold-falcon" - but you don't want to pull in a dependency for it.

  `vrk moniker` generates memorable adjective-noun names from embedded wordlists. Deterministic with `--seed` for reproducible names. Use `--count` for batches and `--words` for longer names when you need more uniqueness. No duplicates within a single batch.
problem: >
  You label pipeline runs with timestamps like run-20260330-174856. Three runs
  fail in the same minute. The labels are identical. You switch to UUIDs and now
  nobody can tell "run 98d06ca5" from "run c4fd6dd9" during an incident call.
  You need names that are unique AND human-friendly.
before: |
  echo "run-$(date +%Y%m%d-%H%M%S)"
  # Identical for concurrent runs, not human-memorable
after: "vrk moniker"
group: v1
category: utilities
example: "vrk moniker --count 5 --seed 42"
flags:
  - flag: --count
    short: "-n"
    type: int
    description: Number of names to generate
  - flag: --separator
    short: ""
    type: string
    description: Word separator
  - flag: --words
    short: ""
    type: int
    description: Words per name (minimum 2)
  - flag: --seed
    short: ""
    type: int64
    description: Random seed for deterministic output
  - flag: --json
    short: "-j"
    type: bool
    description: "Emit JSON per name: {name, words}"
  - flag: --quiet
    short: "-q"
    type: bool
    description: Suppress stderr output
exit_codes:
  - code: 0
    meaning: Success
  - code: 1
    meaning: Word pool exhausted for requested count
  - code: 2
    meaning: --count less than 1, --words less than 2
og_image:
  headline: "Generate memorable names. For pipelines."
  code: "vrk moniker --seed 42"
mcp_callable: true
