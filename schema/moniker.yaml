name: moniker
tagline: memorable name generator - run IDs, job labels, temp dirs
description: |
  Generates memorable adjective-noun names like "bold-falcon" or "calm-otter" from a curated word list. Useful for pipeline runs, temp directories, and job labels where humans need to reference things by name. Deterministic with a seed, and no duplicates within a batch.
problem: >
  During an incident you have six parallel pipeline runs. Someone on the call says
  "the failing one is 7f3a... no wait, 7f3b..." and everyone is looking at the wrong
  logs. UUIDs work as identifiers but fail as labels humans reference under pressure.
before: |
  RUN_ID=$(uuidgen | tr '[:upper:]' '[:lower:]')
  echo "starting run $RUN_ID"
  # incident call: "which run?" "7f3a9c2e... no, 7f3b..."
  # six runs open, all starting with 7f3
after: |
  RUN_ID=$(vrk moniker --seed "$BUILD_NUMBER")
  echo "starting run $RUN_ID"
  # incident call: "which run?" "bold-falcon"
group: v1
category: utilities
example: vrk moniker --seed 42
flags:
  - flag: --count
    short: "-n"
    type: int
    description: Number of names to generate
  - flag: --separator
    short: ""
    type: string
    description: Word separator
  - flag: --words
    short: ""
    type: int
    description: Words per name (minimum 2)
  - flag: --seed
    short: ""
    type: int64
    description: Random seed for deterministic output
  - flag: --json
    short: "-j"
    type: bool
    description: "Emit JSON per name: {name, words}"
  - flag: --quiet
    short: "-q"
    type: bool
    description: Suppress stderr output
exit_codes:
  - code: 0
    meaning: Success
  - code: 1
    meaning: Word pool exhausted for requested count
  - code: 2
    meaning: --count less than 1, --words less than 2
og_image:
  headline: "Generate memorable names. For pipelines."
  code: "vrk moniker --seed 42"
mcp_callable: true
