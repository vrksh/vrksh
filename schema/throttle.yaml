name: throttle
tagline: rate limiter for pipes - --rate N/s or N/m
meta_description: "Pace LLM batch jobs to respect rate limits. No more failures on job 847 of 10,000."
og_title: "vrk throttle - rate-limit-aware pacing for LLM batch jobs"
description: |
  You're calling an LLM API in a loop and hitting rate limits. The API allows 10 requests per second. Your loop fires as fast as stdin delivers lines. You add `sleep 0.1` but that's per iteration, not per second, and doesn't account for processing time. The API still rate-limits you.

  `vrk throttle` paces pipeline flow to a specified rate. Set `--rate 10/s` or `--rate 100/m` and lines are delayed to match. Use `--burst` to let the first N lines through immediately. Use `--tokens-field` for token-aware rate limiting when different records consume different API quotas.
problem: >
  Your pipeline processes 10,000 JSONL records through an LLM API. The API allows
  60 requests per minute. Your pipeline fires requests as fast as it reads lines
  and gets rate-limited after the first 60. You add sleep 1 between requests but
  that turns a 3-minute pipeline into a 3-hour pipeline because sleep 1 is way
  too conservative.
before: |
  cat records.jsonl | while read line; do
    process "$line"
    sleep 1  # Too slow. 60/min API allows faster.
  done
after: "cat records.jsonl | vrk throttle --rate 60/m | process-each"
group: v1
category: utilities
example: "cat records.jsonl | vrk throttle --rate 10/s --burst 5"
flags:
  - flag: --rate
    short: "-r"
    type: string
    description: "Rate limit in N/s or N/m format (required)"
  - flag: --burst
    short: ""
    type: int
    description: Emit first N lines immediately before applying rate limit
  - flag: --tokens-field
    short: ""
    type: string
    description: Dot-path to JSONL field for token-based rate limiting
  - flag: --json
    short: "-j"
    type: bool
    description: Append metadata record after all output
  - flag: --quiet
    short: "-q"
    type: bool
    description: Suppress stderr output
exit_codes:
  - code: 0
    meaning: All lines emitted at specified rate
  - code: 1
    meaning: Stdin read error, write error, or --tokens-field not found
  - code: 2
    meaning: --rate missing or invalid, interactive TTY
og_image:
  headline: "Rate-limit your pipes. Stay under API caps."
  code: "cat urls.txt | vrk throttle --rate 10/s | xargs vrk grab"
mcp_callable: false
