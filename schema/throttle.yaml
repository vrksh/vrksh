name: throttle
tagline: rate limiter for pipes - --rate N/s or N/m
meta_description: "Pace LLM batch jobs to respect rate limits. No more failures on job 847 of 10,000."
og_title: "vrk throttle - rate-limit-aware pacing for LLM batch jobs"
description: |
  Controls how fast lines flow through a pipeline. You set a rate like 10/s or 100/m and throttle re-emits lines at that pace. Sits between a source and a consumer to keep you under API rate limits without writing sleep loops.
problem: >
  You pipe 10,000 URLs into an API client and get rate-limited after the first 100.
  You add a sleep between calls but it is either too slow (wasting time) or too fast
  (still hitting limits). Burst handling requires a token bucket you do not want to implement.
before: |
  cat urls.txt | while read url; do
    curl -s "$url"
    sleep 0.1
  done
  # too slow for APIs that allow bursts
  # too fast when the API is strict
after: "cat urls.txt | vrk throttle --rate 10/s | xargs -I{} curl -s {}"
group: v1
category: utilities
example: cat urls.txt | vrk throttle --rate 10/s | xargs -I{} vrk grab {}
flags:
  - flag: --rate
    short: "-r"
    type: string
    description: "Rate limit in N/s or N/m format (required)"
  - flag: --burst
    short: ""
    type: int
    description: Emit first N lines immediately before applying rate limit
  - flag: --tokens-field
    short: ""
    type: string
    description: Dot-path to JSONL field for token-based rate limiting
  - flag: --json
    short: "-j"
    type: bool
    description: Append metadata record after all output
  - flag: --quiet
    short: "-q"
    type: bool
    description: Suppress stderr output
exit_codes:
  - code: 0
    meaning: All lines emitted at specified rate
  - code: 1
    meaning: Stdin read error, write error, or --tokens-field not found
  - code: 2
    meaning: --rate missing or invalid, interactive TTY
og_image:
  headline: "Rate-limit your pipes. Stay under API caps."
  code: "cat urls.txt | vrk throttle --rate 10/s | xargs vrk grab"
mcp_callable: false
