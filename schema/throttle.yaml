name: throttle
tagline: rate limiter for pipes - --rate N/s or N/m
meta_description: "vrk throttle paces LLM batch jobs to stay within API rate limits. Pipe any stream through it - no more failures at job 847 of 10,000. One flag: --rate N/s or N/m."
og_title: "vrk throttle - rate-limit-aware pacing for LLM batch jobs"
description: |
  `vrk throttle` paces pipeline flow to a specified rate. `--rate 10/s` or `--rate 100/m` delays lines to match. `--burst` lets the first N lines through immediately. `--tokens-field` enables token-aware rate limiting when records consume different API quotas.
problem: >
  A pipeline sends 10,000 requests to an LLM API that allows 60 per minute. It
  fires as fast as stdin delivers and gets rate-limited after the first 60. Adding
  `sleep 1` between requests is too conservative and turns a 3-minute job into
  a 3-hour one. `sleep` is per-iteration, not per-second, and ignores processing time.
before: |
  cat records.jsonl | while read line; do
    process "$line"
    sleep 1  # Too slow. 60/min API allows faster.
  done
after: "cat records.jsonl | vrk throttle --rate 60/m | process-each"
group: v1
category: utilities
example: "cat records.jsonl | vrk throttle --rate 10/s --burst 5"
flags:
  - flag: --rate
    short: "-r"
    type: string
    description: "Rate limit in N/s or N/m format (required)"
  - flag: --burst
    short: ""
    type: int
    description: Emit first N lines immediately before applying rate limit
  - flag: --tokens-field
    short: ""
    type: string
    description: Dot-path to JSONL field for token-based rate limiting
  - flag: --json
    short: "-j"
    type: bool
    description: Append metadata record after all output
  - flag: --quiet
    short: "-q"
    type: bool
    description: Suppress stderr output
exit_codes:
  - code: 0
    meaning: All lines emitted at specified rate
  - code: 1
    meaning: Stdin read error, write error, or --tokens-field not found
  - code: 2
    meaning: --rate missing or invalid, interactive TTY
meta_title: "vrk throttle - Rate Limiter for LLM API Batch Jobs"
meta_lead: "vrk throttle is a rate limiter for LLM API batch jobs - pace your pipeline to stay within API limits."
og_image:
  headline: "Rate-limit your pipes. Stay under API caps."
  code: "cat urls.txt | vrk throttle --rate 10/s | xargs vrk grab"
mcp_callable: false
