name: sip
tagline: stream sampler - --first, --count, --every, --sample
meta_description: "Sample lines from a stream. Take the first N, every Nth, or a random percentage. Works on unbounded input."
og_title: "vrk sip - sample lines from streams and large files"
description: |
  You have a 10-million-line JSONL file and you need a random sample of 1,000 lines for testing. `shuf -n 1000` loads the entire file into memory. `head -1000` only gives you the first 1,000 lines, which isn't random. You write a Python script with reservoir sampling and it takes 20 lines for something that should be one command.

  `vrk sip` samples lines from stdin using one of four strategies: `--first N` (first N lines), `--count N` (uniform random sample via reservoir sampling, O(N) memory), `--every N` (every Nth line), or `--sample N` (each line with N% probability). Use `--seed` for reproducible samples.
problem: >
  You need to test a pipeline on a subset of data. head -1000 gives you the first
  1000 lines but they're not representative. shuf -n 1000 gives you a random sample
  but loads the entire file into memory. On a 10GB log file, shuf gets OOM-killed.
  You need reservoir sampling but don't want to write it.
before: |
  shuf -n 1000 large-file.jsonl
  # Loads entire file into memory. OOM on large files.
after: "cat large-file.jsonl | vrk sip --count 1000 --seed 42"
group: v1
category: utilities
example: "cat access.log | vrk sip --count 1000 --seed 42"
flags:
  - flag: --first
    short: ""
    type: int
    description: Take first N lines
  - flag: --count
    short: "-n"
    type: int
    description: Reservoir sample of exactly N lines
  - flag: --every
    short: ""
    type: int
    description: Emit every Nth line
  - flag: --sample
    short: ""
    type: int
    description: Include each line with N% probability (1-100)
  - flag: --seed
    short: ""
    type: int64
    description: Random seed for reproducibility
  - flag: --json
    short: "-j"
    type: bool
    description: Append metadata record after all output
  - flag: --quiet
    short: "-q"
    type: bool
    description: Suppress stderr output
exit_codes:
  - code: 0
    meaning: Success
  - code: 1
    meaning: I/O failure reading stdin
  - code: 2
    meaning: No strategy specified, multiple strategies, --sample outside 1-100, interactive TTY
og_image:
  headline: "Sample streams. Without loading them."
  code: "cat huge.jsonl | vrk sip --count 100 --seed 42"
mcp_callable: true
