name: sip
tagline: stream sampler - --first, --count, --every, --sample
description: |
  Samples lines from a stream without loading the whole thing into memory. You can take a random sample of N lines, every Nth line, or the first N lines. Uses reservoir sampling for uniform random selection, so every line has an equal chance of being picked.
problem: >
  You have a 10GB JSONL file and need a random sample of 100 records. head gives
  you the first 100, not a random sample. shuf loads the entire file into memory.
  You write a Python script with reservoir sampling and it takes 20 lines.
before: |
  shuf -n 100 huge.jsonl
  # loads entire file into memory
  # not available on macOS without coreutils
after: "cat huge.jsonl | vrk sip --count 100 --seed 42"
group: v1
category: utilities
example: cat huge.jsonl | vrk sip --count 100 --seed 42
flags:
  - flag: --first
    short: ""
    type: int
    description: Take first N lines
  - flag: --count
    short: "-n"
    type: int
    description: Reservoir sample of exactly N lines
  - flag: --every
    short: ""
    type: int
    description: Emit every Nth line
  - flag: --sample
    short: ""
    type: int
    description: Include each line with N% probability (1-100)
  - flag: --seed
    short: ""
    type: int64
    description: Random seed for reproducibility
  - flag: --json
    short: "-j"
    type: bool
    description: Append metadata record after all output
  - flag: --quiet
    short: "-q"
    type: bool
    description: Suppress stderr output
exit_codes:
  - code: 0
    meaning: Success
  - code: 1
    meaning: I/O failure reading stdin
  - code: 2
    meaning: No strategy specified, multiple strategies, --sample outside 1-100, interactive TTY
og_image:
  headline: "Sample streams. Without loading them."
  code: "cat huge.jsonl | vrk sip --count 100 --seed 42"
mcp_callable: true
