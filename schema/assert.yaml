name: assert
tagline: pipeline condition check - jq conditions, --contains, --matches
meta_description: "Assert conditions mid-pipeline. Exit 1 if a check fails. Catches bad data before it reaches the next stage."
og_title: "vrk assert - pipeline condition checks that halt on failure"
description: |
  `vrk assert` evaluates conditions on pipeline data and stops the flow if a check fails. In JSON mode it runs gojq expressions. In text mode it checks substrings or regex patterns. Data passes through on success, so you can insert it between any two pipeline stages as a gate without breaking the data flow.
problem: >
  Schema validation catches missing fields and wrong types. It does not catch
  wrong values. An LLM returns {"status":"error","message":"rate limited"} and
  the schema passes because status is a string. The garbage ends up in your
  database. You find out when a user reports it.
before: |
  echo "$RESPONSE" | jq -e '.status == "ok"' > /dev/null
  if [ $? -ne 0 ]; then exit 1; fi
  echo "$RESPONSE" | next-step
  # data doesn't pass through, must re-read
after: "echo $RESPONSE | vrk assert '.status == \"ok\"' | next-step"
group: v1
category: utilities
example: "echo '{\"status\":\"ok\",\"count\":42}' | vrk assert '.count > 0'"
flags:
  - flag: --contains
    short: ""
    type: string
    description: Assert stdin contains this literal substring
  - flag: --matches
    short: ""
    type: string
    description: Assert stdin matches this regular expression. Complex patterns with many alternations reduce throughput on large streams.
  - flag: --message
    short: "-m"
    type: string
    description: Custom message on failure
  - flag: --json
    short: "-j"
    type: bool
    description: Emit errors as JSON to stdout
  - flag: --quiet
    short: "-q"
    type: bool
    description: Suppress stderr output on failure
exit_codes:
  - code: 0
    meaning: All conditions passed; input passed through to stdout
  - code: 1
    meaning: Assertion failed, or runtime error
  - code: 2
    meaning: No condition specified, mixed modes, invalid regex, interactive TTY
og_image:
  headline: "Assert conditions. Stop bad data."
  code: "vrk assert --contains '\"status\":\"ok\"' < response.json"
mcp_callable: true
