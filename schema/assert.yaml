name: assert
tagline: pipeline condition check - jq conditions, --contains, --matches
meta_description: "Assert conditions mid-pipeline. Exit 1 if a check fails. Catches bad data before it reaches the next stage."
og_title: "vrk assert - pipeline condition checks that halt on failure"
description: |
  Checks a condition on your pipeline data and either passes it through or stops the pipeline. You can match JSON with jq expressions or plain text with substring and regex checks. If the condition fails, nothing reaches the next step.
problem: >
  You pipe JSON through a pipeline and assume the shape is correct. Three steps later,
  a malformed record silently corrupts your output. You only notice when a customer
  reports wrong data.
before: |
  curl -s https://api.example.com/health | jq -e '.status == "ok"' > /dev/null
after: "vrk grab https://api.example.com/health | vrk assert --contains '\"status\":\"ok\"'"
group: v1
category: utilities
example: vrk grab https://api.example.com/health | vrk assert --contains '"status":"ok"'
flags:
  - flag: --contains
    short: ""
    type: string
    description: Assert stdin contains this literal substring
  - flag: --matches
    short: ""
    type: string
    description: Assert stdin matches this regular expression
  - flag: --message
    short: "-m"
    type: string
    description: Custom message on failure
  - flag: --json
    short: "-j"
    type: bool
    description: Emit errors as JSON to stdout
  - flag: --quiet
    short: "-q"
    type: bool
    description: Suppress stderr output on failure
exit_codes:
  - code: 0
    meaning: All conditions passed; input passed through to stdout
  - code: 1
    meaning: Assertion failed, or runtime error
  - code: 2
    meaning: No condition specified, mixed modes, invalid regex, interactive TTY
og_image:
  headline: "Assert conditions. Stop bad data."
  code: "vrk assert --contains '\"status\":\"ok\"' < response.json"
mcp_callable: true
