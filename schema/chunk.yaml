name: chunk
tagline: token-aware text splitter - JSONL chunks within a token budget
meta_description: "Split text into token-aware chunks that fit LLM context windows. JSONL output, respects sentence boundaries."
og_title: "vrk chunk - token-aware text splitter for LLM context windows"
description: |
  You have a 50-page contract and you need an LLM to extract every obligation. The document is 38,000 tokens. Your model's context window is 8,192. You split on line count - 100 lines per file. Some chunks are 800 tokens, some are 3,200. One chunk ends mid-sentence. The obligation "Vendor shall deliver... within 30 days" gets split across two chunks. Both chunks miss it.

  `vrk chunk` splits long documents into token-aware pieces that fit within an LLM's context window. Each chunk is emitted as a JSONL record with its index, text, and exact token count. Splitting respects token boundaries and supports configurable overlap so context is preserved at the edges. No more guessing whether `split -l 100` maps to tokens.
problem: >
  You need to process a long document through an LLM but it exceeds the context
  window. `split -l` splits by line count, which has no relationship to token count.
  `fold -w` splits by characters, which is worse. You write a Python script to split
  by tokens and it takes longer to debug than the actual task. Meanwhile, every entity
  that spans a split boundary is silently lost.
before: |
  split -l 100 document.txt chunk_
  # chunk_aa: 312 tokens (wasted context space)
  # chunk_ab: 4,891 tokens (exceeds your budget)
  # chunk_ac: split mid-sentence, entity lost at boundary
after: "cat document.txt | vrk chunk --size 4000 --overlap 200"
group: v1
category: core
example: cat contract.pdf.txt | vrk chunk --size 4000 --overlap 200
flags:
  - flag: --size
    short: ""
    type: int
    description: Max tokens per chunk (required)
  - flag: --overlap
    short: ""
    type: int
    description: Token overlap between adjacent chunks
  - flag: --by
    short: ""
    type: string
    description: "Chunking strategy: paragraph"
  - flag: --quiet
    short: "-q"
    type: bool
    description: Suppress stderr output
exit_codes:
  - code: 0
    meaning: Success, including empty input
  - code: 1
    meaning: I/O error
  - code: 2
    meaning: No input, --size missing or < 1, --overlap >= --size, unknown flag
og_image:
  headline: "Split documents. Stay within token budgets."
  code: "cat long-doc.md | vrk chunk --size 4000"
mcp_callable: true
