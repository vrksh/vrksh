name: chunk
tagline: token-aware text splitter - JSONL chunks within a token budget
description: |
  Splits long documents into chunks that fit within an LLM's context window. Each chunk comes out as a JSONL record with its index, text, and exact token count. Splits at paragraph boundaries when possible and supports overlap so you don't lose context at the edges.
problem: >
  You need to send a long document to an LLM but it exceeds the context window.
  You split on line count or character count, but neither maps to tokens. Chunks
  end up too large or too small, and you lose context at split boundaries.
before: |
  split -l 100 document.txt chunk_
  # no idea how many tokens each chunk is
  # no overlap for context continuity
after: "cat document.txt | vrk chunk --size 4000 --overlap 200"
group: v1
category: core
example: cat long-doc.md | vrk chunk --size 4000
flags:
  - flag: --size
    short: ""
    type: int
    description: Max tokens per chunk (required)
  - flag: --overlap
    short: ""
    type: int
    description: Token overlap between adjacent chunks
  - flag: --by
    short: ""
    type: string
    description: "Chunking strategy: paragraph"
  - flag: --quiet
    short: "-q"
    type: bool
    description: Suppress stderr output
exit_codes:
  - code: 0
    meaning: Success, including empty input
  - code: 1
    meaning: I/O error
  - code: 2
    meaning: No input, --size missing or < 1, --overlap >= --size, unknown flag
og_image:
  headline: "Split documents. Stay within token budgets."
  code: "cat long-doc.md | vrk chunk --size 4000"
mcp_callable: true
