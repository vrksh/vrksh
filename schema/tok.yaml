name: tok
tagline: Count tokens. Gate pipelines before they fail.
meta_description: "vrk tok counts tokens from stdin and gates pipelines before they fail. Pass --check N to stop the pipeline if input exceeds your context budget. No Python runtime needed."
description: |
  You send a 15,000-token document to a model with a 4,096-token context window. No error. The response looks plausible. Three days later a QA reviewer finds an inconsistency - the model only saw the first third of your input. Silent truncation is the most expensive bug in LLM pipelines because it looks like success.

  `vrk tok` is a token counter and pipeline gate that catches this in 5ms. It uses the cl100k_base tokenizer, which gives exact counts for GPT-4 and roughly 95% accuracy for Claude. Without `--check` it measures and prints the count. With `--check N` it passes the input through untouched if within budget, or exits 1 with empty stdout if over - killing the pipeline before it wastes an API call.
problem: >
  Your system prompt is 6,000 tokens. You don't know that because you've been
  estimating by word count. You concatenate it with user input and send it to
  a model with an 8,192-token limit. The model truncates silently. The summary
  it returns is confident, complete-looking, and wrong. You find out in production.
before: |
  # "Probably fine" - counting words as a proxy for tokens
  wc -w system-prompt.txt
  # 1,847 words... is that under 4,096 tokens? Who knows.
after: "cat system-prompt.txt | vrk tok"
group: v1
category: core
example: cat system-prompt.txt | vrk tok --check 8000 | vrk prompt --system 'Summarize'
flags:
  - flag: --check
    short: ""
    type: int
    description: Pass input through if ≤N tokens; exit 1 with empty stdout if over
  - flag: --model
    short: ""
    type: string
    description: Tokenizer - cl100k_base (default)
  - flag: --json
    short: "-j"
    type: bool
    description: Emit JSON (measurement) or JSON error (gate). Does not wrap passthrough.
  - flag: --quiet
    short: "-q"
    type: bool
    description: Suppress stderr on failure
exit_codes:
  - code: 0
    meaning: Measurement success; or --check within limit
  - code: 1
    meaning: --check over limit; I/O error; tokenizer error
  - code: 2
    meaning: Usage error - unknown flag, no stdin, --check without value
meta_title: "vrk tok - Token Counter CLI for LLM Pipelines"
meta_lead: "vrk tok is a command-line token counter for LLM pipelines."
og_image:
  headline: "Silent truncation looks like success. vrk tok fails loudly."
  code: "cat prompt.txt | vrk tok"
mcp_callable: true
