name: tok
tagline: token counter - cl100k_base, --budget guard, --json.
description: |
  Count tokens using cl100k_base. Exact for GPT-4, ~95% accurate for Claude.
  Exits 1 if input exceeds --budget. The guard that prevents surprise API bills.
group: v1
category: core
example: cat prompt.txt | vrk tok --budget 4000
flags:
  - flag: --json
    short: "-j"
    type: bool
    description: Emit JSON with token count and metadata
  - flag: --budget
    short: ""
    type: int
    description: Exit 1 if token count exceeds N
  - flag: --model
    short: "-m"
    type: string
    description: Tokenizer model (currently cl100k_base only)
  - flag: --quiet
    short: "-q"
    type: bool
    description: Suppress stderr output
exit_codes:
  - code: 0
    meaning: Success, within budget
  - code: 1
    meaning: Over budget or I/O error
  - code: 2
    meaning: Usage error - no input, unknown flag
og_image:
  headline: "Count tokens. Guard LLM context windows."
  code: "vrk tok --budget 4000 < prompt.txt"
mcp_callable: true
