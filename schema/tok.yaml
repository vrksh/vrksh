name: tok
tagline: token counter - cl100k_base, --budget guard, --json.
description: |
  Counts tokens in your text using the cl100k_base tokenizer. Exact for GPT-4 and roughly 95% accurate for Claude. Use it as a guard before sending prompts to an LLM - if the input exceeds your token budget, tok exits 1 and your pipeline stops before the API call.
problem: >
  LLM APIs silently truncate prompts that exceed the context window. You get a degraded
  response with no error. There is no built-in way to check token count before you send.
before: |
  python3 -c "
  import tiktoken
  enc = tiktoken.get_encoding('cl100k_base')
  print(len(enc.encode(open('prompt.txt').read())))
  "
after: "cat prompt.txt | vrk tok --budget 4000"
group: v1
category: core
example: cat prompt.txt | vrk tok --budget 4000
flags:
  - flag: --json
    short: "-j"
    type: bool
    description: Emit JSON with token count and metadata
  - flag: --budget
    short: ""
    type: int
    description: Exit 1 if token count exceeds N
  - flag: --model
    short: "-m"
    type: string
    description: Tokenizer model (currently cl100k_base only)
  - flag: --quiet
    short: "-q"
    type: bool
    description: Suppress stderr output
exit_codes:
  - code: 0
    meaning: Success, within budget
  - code: 1
    meaning: Over budget or I/O error
  - code: 2
    meaning: Usage error - no input, unknown flag
og_image:
  headline: "Count tokens. Guard LLM context windows."
  code: "vrk tok --budget 4000 < prompt.txt"
mcp_callable: true
