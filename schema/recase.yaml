name: recase
tagline: naming convention converter - snake, camel, kebab, pascal, title
meta_description: "Convert between naming conventions. snake_case, camelCase, kebab-case, PascalCase, and Title Case."
og_title: "vrk recase - convert between snake, camel, kebab, and more"
description: |
  Your API returns `snake_case` field names but your frontend expects `camelCase`. You write a sed command to convert and it breaks on acronyms - `http_api_url` becomes `httpApiUrl` instead of handling the abbreviation correctly.

  `vrk recase` converts between naming conventions: snake_case, camelCase, PascalCase, kebab-case, SCREAMING_SNAKE, Title Case, and more. Auto-detects the input convention. Handles acronyms correctly. Processes line by line so you can convert a list of names in one pass.
problem: >
  You're migrating an API and need to convert 200 field names from snake_case to
  camelCase. You write a Python script. It takes 30 lines to handle edge cases:
  leading underscores, consecutive capitals, numeric suffixes. You test it on
  http_api_url and get httpApiUrl. Close enough? Not for a public API.
before: |
  echo 'user_first_name' | sed 's/_\(.\)/\U\1/g'
  # Breaks on acronyms, doesn't handle PascalCase or kebab-case
after: "echo 'user_first_name' | vrk recase --to camel"
group: v1
category: utilities
example: "echo 'user_first_name' | vrk recase --to camel"
flags:
  - flag: --to
    short: ""
    type: string
    description: "Target convention: camel, pascal, snake, kebab, screaming, title, lower, upper"
  - flag: --json
    short: "-j"
    type: bool
    description: "Emit JSON per line: {input, output, from, to}"
  - flag: --quiet
    short: "-q"
    type: bool
    description: Suppress stderr output
exit_codes:
  - code: 0
    meaning: Success
  - code: 1
    meaning: Runtime error (I/O failure)
  - code: 2
    meaning: --to missing or invalid value, interactive TTY with no stdin
og_image:
  headline: "Convert naming conventions. Instantly."
  code: "echo 'getUserName' | vrk recase --to snake"
mcp_callable: true
