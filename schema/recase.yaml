name: recase
tagline: naming convention converter - snake, camel, kebab, pascal, title
meta_description: "Convert between naming conventions. snake_case, camelCase, kebab-case, PascalCase, and Title Case."
meta_lead: "vrk recase converts between naming conventions - snake_case, camelCase, kebab-case, PascalCase, and more."
og_title: "vrk recase - convert between snake, camel, kebab, and more"
description: |
  `vrk recase` converts between naming conventions: snake_case, camelCase, PascalCase, kebab-case, SCREAMING_SNAKE, Title Case, and more. Auto-detects the input convention and handles acronyms correctly. Processes line by line for batch conversion.
problem: >
  Converting 200 field names from snake_case to camelCase takes 30 lines of Python
  to handle edge cases: leading underscores, consecutive capitals, numeric suffixes.
  `sed 's/_\(.\)/\U\1/g'` handles simple cases but breaks on acronyms like
  `http_api_url`.
before: |
  echo 'user_first_name' | sed 's/_\(.\)/\U\1/g'
  # Breaks on acronyms, doesn't handle PascalCase or kebab-case
after: "echo 'user_first_name' | vrk recase --to camel"
group: v1
category: utilities
example: "echo 'user_first_name' | vrk recase --to camel"
flags:
  - flag: --to
    short: ""
    type: string
    description: "Target convention: camel, pascal, snake, kebab, screaming, title, lower, upper"
  - flag: --json
    short: "-j"
    type: bool
    description: "Emit JSON per line: {input, output, from, to}"
  - flag: --quiet
    short: "-q"
    type: bool
    description: Suppress stderr output
exit_codes:
  - code: 0
    meaning: Success
  - code: 1
    meaning: Runtime error (I/O failure)
  - code: 2
    meaning: --to missing or invalid value, interactive TTY with no stdin
og_image:
  headline: "Convert naming conventions. Instantly."
  code: "echo 'getUserName' | vrk recase --to snake"
mcp_callable: true
