name: kv
tagline: key-value store - SQLite-backed, namespaces, TTL, atomic counters.
meta_description: "Persistent key-value store for pipelines. SQLite-backed, with namespaces, TTL, and atomic counters."
og_title: "vrk kv - SQLite key-value store for shell pipelines"
description: |
  Your pipeline needs to remember state between runs - a cursor position, a count of processed items, a last-seen timestamp. You write to a flat file, but concurrent runs corrupt it. You add flock, but that doesn't work on NFS. You reach for Redis, but that's a whole server for one key.

  `vrk kv` is a persistent key-value store backed by SQLite. It stores strings, supports namespaces to isolate different pipelines, TTL for automatic expiry, and atomic increment/decrement for safe concurrent use. The database lives at `~/.vrk.db` (override with `VRK_KV_PATH`). No server. No config. Just set and get.
problem: >
  Your nightly pipeline processes items from a queue. It needs to track how many
  items it processed, store the timestamp of the last run, and resume from where
  it left off if it crashes. You write cursor state to /tmp/last_cursor.txt.
  A second cron job starts before the first finishes. Both read the same cursor.
  Both process the same 200 items. Your downstream database has duplicates.
before: |
  echo "12345" > /tmp/last_cursor.txt
  CURSOR=$(cat /tmp/last_cursor.txt)
  # no atomic increment, no TTL, no namespaces
  # concurrent writes corrupt the file
after: |
  vrk kv set cursor "12345" --ttl 24h
  vrk kv get cursor
  vrk kv incr --ns pipeline processed
group: v1
category: pipeline
example: "vrk kv set --ns nightly-pipeline last_run \"$(vrk epoch --now)\" --ttl 24h"
flags:
  - flag: --ns
    short: ""
    type: string
    description: Namespace (default "default")
  - flag: --quiet
    short: "-q"
    type: bool
    description: Suppress stderr output
  - flag: --ttl
    short: ""
    type: duration
    description: Expiry duration (set only); 0 = no expiry
  - flag: --dry-run
    short: ""
    type: bool
    description: Print intent without writing (set only)
  - flag: --json
    short: "-j"
    type: bool
    description: Emit errors as JSON (get, incr, decr)
  - flag: --by
    short: ""
    type: int
    description: Delta for incr/decr (must be >= 1)
exit_codes:
  - code: 0
    meaning: Success
  - code: 1
    meaning: Key not found, not a number, or database error
  - code: 2
    meaning: Usage error - unknown subcommand, missing args
og_image:
  headline: "Key-value store for pipelines. SQLite-backed."
  code: "vrk kv set --ns cache api_result val --ttl 1h"
mcp_callable: true
