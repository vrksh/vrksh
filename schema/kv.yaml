name: kv
tagline: key-value store - SQLite-backed, namespaces, TTL, atomic counters.
description: |
  A persistent key-value store for pipelines, backed by SQLite. You can store state between runs - cursors, counters, timestamps - with namespaces to keep things isolated and TTL for automatic expiry. Supports atomic increment and decrement for safe concurrent use.
problem: >
  Your pipeline needs to remember state between runs - a cursor, a count, a last-seen
  timestamp. You write to a flat file, but concurrent runs corrupt it. You add flock,
  but that does not work on NFS. You reach for Redis, but that is a whole server for
  one key.
before: |
  echo "12345" > /tmp/last_cursor.txt
  CURSOR=$(cat /tmp/last_cursor.txt)
  # no atomic increment, no TTL, no namespaces
  # concurrent writes corrupt the file
after: |
  vrk kv set cursor "12345" --ttl 1h
  vrk kv get cursor
group: v1
category: pipeline
example: vrk kv set --ns cache mykey "myvalue" --ttl 1h
flags:
  - flag: --ns
    short: ""
    type: string
    description: Namespace (default "default")
  - flag: --quiet
    short: "-q"
    type: bool
    description: Suppress stderr output
  - flag: --ttl
    short: ""
    type: duration
    description: Expiry duration (set only); 0 = no expiry
  - flag: --dry-run
    short: ""
    type: bool
    description: Print intent without writing (set only)
  - flag: --json
    short: "-j"
    type: bool
    description: Emit errors as JSON (get, incr, decr)
  - flag: --by
    short: ""
    type: int
    description: Delta for incr/decr (must be >= 1)
exit_codes:
  - code: 0
    meaning: Success
  - code: 1
    meaning: Key not found, not a number, or database error
  - code: 2
    meaning: Usage error - unknown subcommand, missing args
og_image:
  headline: "Key-value store for pipelines. SQLite-backed."
  code: "vrk kv set --ns cache api_result val --ttl 1h"
mcp_callable: true
