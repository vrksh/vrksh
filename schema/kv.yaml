name: kv
tagline: Key-value store - SQLite-backed, namespaces, TTL, atomic counters.
description: |
  Persistent key-value store backed by SQLite at ~/.vrk.db. Supports
  namespaces for isolation, TTL for expiry, and atomic increment/decrement
  for counters. Subcommands: set, get, del, list, incr, decr.
group: v1
example: vrk kv set --ns cache mykey "myvalue" --ttl 1h
flags:
  - flag: --ns
    short: ""
    type: string
    description: Namespace (default "default")
  - flag: --quiet
    short: "-q"
    type: bool
    description: Suppress stderr output
  - flag: --ttl
    short: ""
    type: duration
    description: Expiry duration (set only); 0 = no expiry
  - flag: --dry-run
    short: ""
    type: bool
    description: Print intent without writing (set only)
  - flag: --json
    short: "-j"
    type: bool
    description: Emit errors as JSON (get, incr, decr)
  - flag: --by
    short: ""
    type: int
    description: Delta for incr/decr (must be >= 1)
exit_codes:
  - code: 0
    meaning: Success
  - code: 1
    meaning: Key not found, not a number, or database error
  - code: 2
    meaning: Usage error - unknown subcommand, missing args
og_image:
  headline: "Key-value store for pipelines. SQLite-backed."
  code: "vrk kv set --ns cache api_result val --ttl 1h"
mcp_callable: true
