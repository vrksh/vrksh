name: pct
tagline: "Percent encoder/decoder - RFC 3986, --encode, --decode, --form"
tier: utility
when_to_use: When you need to percent-encode query parameters or decode URL-encoded strings
hero_command: echo 'hello world' | vrk pct --encode
primary_output: hello%20world
primary_context: reads from stdin
avoid: Do not use for full URL construction - pct encodes values, not complete URLs
contract:
  input: stdin
  output: stdout
  output_format: text
failure:
  exit_code: 2
  stderr_contains: "pct: either --encode or --decode is required"
  example_command: echo 'test' | vrk pct
mcp:
  callable: true
flags:
  - name: encode
    default: "false"
    description: Percent-encode input (RFC 3986 unless --form)
  - name: decode
    default: "false"
    description: Percent-decode input
  - name: form
    default: "false"
    description: "Use application/x-www-form-urlencoded rules (spaces <-> +)"
  - name: json
    default: "false"
    description: "Emit JSON per line: {input, output, op, mode}"
  - name: quiet
    default: "false"
    description: Suppress stderr output
examples:
  - title: Percent-encode a string
    command: echo 'hello world' | vrk pct --encode
    output: hello%20world
    test: true
  - title: failure case
    command: echo 'test' | vrk pct
    output: "usage error: pct: either --encode or --decode is required"
    is_failure: true
before: |
  from urllib.parse import quote
  print(quote("hello world"))
after: echo 'hello world' | vrk pct --encode
exit_codes:
  0: Success
  1: "Invalid percent sequence during decode, I/O error"
  2: "Neither --encode nor --decode specified, both specified together, interactive TTY"
related:
  - urlinfo
  - base
  - slug
composable_with:
  - urlinfo
  - curl
  - xargs
