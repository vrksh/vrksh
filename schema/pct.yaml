name: pct
tagline: percent encoder/decoder - RFC 3986, --encode, --decode, --form
meta_description: "Percent-encode and decode strings per RFC 3986. Handles URL components and form data correctly."
og_title: "vrk pct - RFC 3986 percent encoding and decoding"
description: |
  You need to percent-encode a URL parameter. `curl --data-urlencode` encodes the whole value but you just need the encoded string. You reach for Python's urllib.parse.quote and it encodes spaces as `+` in some modes and `%20` in others. The difference between path encoding and form encoding matters, and most tools don't let you choose.

  `vrk pct` percent-encodes and decodes text per RFC 3986. Use `--encode` for path-safe encoding (spaces become `%20`). Add `--form` for HTML form encoding (spaces become `+`). Processes line by line for batch conversion.
problem: >
  You're building a URL with query parameters in a shell script. A parameter value
  contains spaces and ampersands. You use Python's quote() but forget the difference
  between quote() and quote_plus(). Spaces become + instead of %20. The API rejects
  the request because it expects path encoding, not form encoding.
before: |
  python3 -c "from urllib.parse import quote; print(quote('hello world'))"
  # Pulls in Python runtime for a one-line operation
after: "echo 'hello world' | vrk pct --encode"
group: v1
category: utilities
example: "echo 'hello world&foo=bar' | vrk pct --encode"
flags:
  - flag: --encode
    short: ""
    type: bool
    description: Percent-encode input (RFC 3986 unless --form)
  - flag: --decode
    short: ""
    type: bool
    description: Percent-decode input
  - flag: --form
    short: ""
    type: bool
    description: "Use application/x-www-form-urlencoded rules (spaces / +)"
  - flag: --json
    short: "-j"
    type: bool
    description: "Emit JSON per line: {input, output, op, mode}"
  - flag: --quiet
    short: "-q"
    type: bool
    description: Suppress stderr output
exit_codes:
  - code: 0
    meaning: Success
  - code: 1
    meaning: Invalid percent sequence during decode, I/O error
  - code: 2
    meaning: Neither --encode nor --decode specified, both specified, interactive TTY
og_image:
  headline: "Percent-encode URLs. RFC 3986 correct."
  code: "echo 'hello world' | vrk pct --encode"
mcp_callable: true
