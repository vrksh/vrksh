name: pct
tagline: percent encoder/decoder - RFC 3986, --encode, --decode, --form
meta_description: "Percent-encode and decode strings per RFC 3986. Handles URL components and form data correctly."
og_title: "vrk pct - RFC 3986 percent encoding and decoding"
description: |
  Percent-encodes and decodes strings following RFC 3986. Handles the difference between path encoding (spaces become %20) and form encoding (spaces become +) so you don't have to remember which is which. Processes one result per line for batch use.
problem: >
  You build a URL with a query parameter that contains spaces and special characters.
  You use printf with manual %20 substitution, miss an ampersand, and the API returns
  a 400. The rules for path encoding vs form encoding differ and you always pick the
  wrong one.
before: |
  QUERY=$(python3 -c "import urllib.parse; print(urllib.parse.quote_plus('$USER_INPUT'))")
  curl "https://api.example.com/search?q=$QUERY"
  # quote() for paths, quote_plus() for forms - easy to mix up
  # breaks if $USER_INPUT contains single quotes
after: |
  QUERY=$(echo "$USER_INPUT" | vrk pct --encode --form)
  curl "https://api.example.com/search?q=$QUERY"
group: v1
category: utilities
example: echo 'hello world' | vrk pct --encode
flags:
  - flag: --encode
    short: ""
    type: bool
    description: Percent-encode input (RFC 3986 unless --form)
  - flag: --decode
    short: ""
    type: bool
    description: Percent-decode input
  - flag: --form
    short: ""
    type: bool
    description: "Use application/x-www-form-urlencoded rules (spaces / +)"
  - flag: --json
    short: "-j"
    type: bool
    description: "Emit JSON per line: {input, output, op, mode}"
  - flag: --quiet
    short: "-q"
    type: bool
    description: Suppress stderr output
exit_codes:
  - code: 0
    meaning: Success
  - code: 1
    meaning: Invalid percent sequence during decode, I/O error
  - code: 2
    meaning: Neither --encode nor --decode specified, both specified, interactive TTY
og_image:
  headline: "Percent-encode URLs. RFC 3986 correct."
  code: "echo 'hello world' | vrk pct --encode"
mcp_callable: true
