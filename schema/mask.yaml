name: mask
tagline: secret redactor - entropy + pattern-based, streaming
meta_description: "Redact secrets from pipeline output before logging. Detects API keys, tokens, and high-entropy strings automatically."
meta_lead: "vrk mask redacts secrets from text using pattern matching and entropy analysis, streaming line by line."
og_title: "vrk mask - automatic secret redaction for pipeline output"
description: |
  `vrk mask` redacts secrets from text using built-in pattern matching for Bearer tokens, API keys, passwords, and connection strings. It also flags high-entropy strings that look like secrets but don't match a known pattern. Streams line-by-line, so it handles any file size. Add `--pattern` for custom regexes.
problem: >
  You pipe 500 lines of application logs to an LLM to diagnose an outage. The
  logs contain database connection strings, API keys in HTTP headers, and Bearer
  tokens. All of it goes to a third-party API. Three months later a security audit
  finds production credentials in the provider's request logs.
before: |
  cat output.log | sed 's/Bearer [^ ]*/Bearer ***/g' | \
    sed 's/password=[^ ]*/password=***/g'
  # misses API keys, high-entropy secrets, custom patterns
after: "cat output.log | vrk mask"
group: v1
category: pipeline
example: "cat deploy.log | vrk mask | vrk prompt --system 'What errors occurred?'"
flags:
  - flag: --pattern
    short: ""
    type: "[]string"
    description: Additional Go regex to match and redact (repeatable). Complex patterns with many alternations reduce throughput on large streams.
  - flag: --entropy
    short: ""
    type: float64
    description: Shannon entropy threshold; lower catches more
  - flag: --json
    short: "-j"
    type: bool
    description: Append metadata trailer after output
  - flag: --quiet
    short: "-q"
    type: bool
    description: Suppress stderr output
exit_codes:
  - code: 0
    meaning: All lines processed
  - code: 1
    meaning: Stdin scanner error or write failure
  - code: 2
    meaning: Interactive TTY with no piped input, invalid regex
og_image:
  headline: "Redact secrets. Before they reach the LLM."
  code: "cat output.txt | vrk mask | vrk prompt"
mcp_callable: true
