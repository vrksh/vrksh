name: mask
tagline: secret redactor - entropy + pattern-based, streaming
description: |
  Redacts secrets from text before it reaches an LLM or a log file. Catches Bearer tokens, passwords, API keys, and other credentials using built-in patterns. Also flags high-entropy strings that look like secrets but don't match a known pattern. Streams input, so it handles large files safely.
problem: >
  You pipe log output to an LLM for analysis and accidentally send API keys, Bearer
  tokens, and passwords in the prompt. The LLM provider now has your production
  credentials in their training pipeline.
before: |
  cat output.log | sed 's/Bearer [^ ]*/Bearer ***/g' | \
    sed 's/password=[^ ]*/password=***/g'
  # misses API keys, high-entropy secrets, custom patterns
after: "cat output.log | vrk mask"
group: v1
category: pipeline
example: cat output.txt | vrk mask
flags:
  - flag: --pattern
    short: ""
    type: "[]string"
    description: Additional Go regex to match and redact (repeatable)
  - flag: --entropy
    short: ""
    type: float64
    description: Shannon entropy threshold; lower catches more
  - flag: --json
    short: "-j"
    type: bool
    description: Append metadata trailer after output
  - flag: --quiet
    short: "-q"
    type: bool
    description: Suppress stderr output
exit_codes:
  - code: 0
    meaning: All lines processed
  - code: 1
    meaning: Stdin scanner error or write failure
  - code: 2
    meaning: Interactive TTY with no piped input, invalid regex
og_image:
  headline: "Redact secrets. Before they reach the LLM."
  code: "cat output.txt | vrk mask | vrk prompt"
mcp_callable: true
