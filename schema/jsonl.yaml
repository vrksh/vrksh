name: jsonl
tagline: JSON array to JSONL converter - --collect, --json
meta_description: "Convert between JSON arrays and JSONL. Flatten arrays for streaming, collect lines back into arrays."
meta_lead: "vrk jsonl converts JSON arrays to JSONL and back for line-by-line pipeline processing."
og_title: "vrk jsonl - convert between JSON arrays and JSONL"
description: |
  `vrk jsonl` converts JSON arrays to JSONL (one object per line) and back. The default mode splits arrays for line-by-line pipeline processing. `--collect` gathers JSONL lines back into a JSON array. The streaming decoder handles files larger than available memory.
problem: >
  An API returns a JSON array of 50,000 records. `jq '.[]'` flattens it but loads
  the entire array into memory first. On a 2GB response the process gets OOM-killed.
  Line-by-line processing requires JSONL, but the API only returns arrays.
before: |
  cat data.json | jq '.[]'
  # Loads entire array into memory. OOM on large files.
after: "cat data.json | vrk jsonl"
group: v1
category: utilities
example: "cat api-response.json | vrk jsonl | vrk validate --schema '{\"name\":\"string\"}'"
flags:
  - flag: --collect
    short: "-c"
    type: bool
    description: Collect JSONL lines into a JSON array
  - flag: --json
    short: "-j"
    type: bool
    description: Append metadata trailer after all records (split mode only)
exit_codes:
  - code: 0
    meaning: Success, including empty input
  - code: 1
    meaning: Invalid JSON, I/O error
  - code: 2
    meaning: Interactive TTY with no input, unknown flag
og_image:
  headline: "JSON arrays to JSONL. And back."
  code: "vrk grab api.example.com/users | vrk jsonl"
mcp_callable: true
