name: jsonl
tagline: JSON array to JSONL converter - --collect, --json
meta_description: "Convert between JSON arrays and JSONL. Flatten arrays for streaming, collect lines back into arrays."
og_title: "vrk jsonl - convert between JSON arrays and JSONL"
description: |
  Converts between JSON arrays and JSONL (one record per line). Splits arrays for pipeline processing, or collects JSONL lines back into an array when an API expects one. Uses a streaming decoder, so it handles arrays larger than available memory.
problem: >
  You have a 3GB JSON array from a data export and need to process records one per
  line. jq -c '.[]' loads the entire array into memory and gets OOM-killed. Going the
  other direction - collecting JSONL back into an array for an API that expects one -
  requires careful bracket and comma handling that breaks on empty input.
before: |
  # split: jq loads entire array into memory, OOM on large files
  cat data.json | jq -c '.[]'
  # collect: manual bracket/comma handling
  echo '['; cat records.jsonl | sed 's/$/,/' | sed '$ s/,$//' ; echo ']'
after: |
  cat data.json | vrk jsonl
  cat records.jsonl | vrk jsonl --collect
group: v1
category: utilities
example: cat data.json | vrk jsonl
flags:
  - flag: --collect
    short: "-c"
    type: bool
    description: Collect JSONL lines into a JSON array
  - flag: --json
    short: "-j"
    type: bool
    description: Append metadata trailer after all records (split mode only)
exit_codes:
  - code: 0
    meaning: Success, including empty input
  - code: 1
    meaning: Invalid JSON, I/O error
  - code: 2
    meaning: Interactive TTY with no input, unknown flag
og_image:
  headline: "JSON arrays to JSONL. And back."
  code: "vrk grab api.example.com/users | vrk jsonl"
mcp_callable: true
