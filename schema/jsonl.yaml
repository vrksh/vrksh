name: jsonl
tagline: JSON array to JSONL converter - --collect, --json
meta_description: "Convert between JSON arrays and JSONL. Flatten arrays for streaming, collect lines back into arrays."
og_title: "vrk jsonl - convert between JSON arrays and JSONL"
description: |
  You have a JSON array with 50,000 objects. You need to process each one through a pipeline. `jq '.[]'` works but loads the entire array into memory. On a 2GB JSON file, your process gets OOM-killed.

  `vrk jsonl` converts between JSON arrays and JSONL (one JSON object per line). The default mode splits an array into individual lines for pipeline processing. Use `--collect` to go the other direction - gather JSONL lines back into a JSON array. The streaming decoder handles files larger than available memory.
problem: >
  Your API returns a JSON array of 50,000 records. You need to validate each one
  and pipe invalid records to an LLM for repair. jq '.[]' loads the entire array
  into memory. On a large response, the process is killed. You need line-by-line
  JSONL but the API only speaks JSON arrays.
before: |
  cat data.json | jq '.[]'
  # Loads entire array into memory. OOM on large files.
after: "cat data.json | vrk jsonl"
group: v1
category: utilities
example: "cat api-response.json | vrk jsonl | vrk validate --schema '{\"name\":\"string\"}'"
flags:
  - flag: --collect
    short: "-c"
    type: bool
    description: Collect JSONL lines into a JSON array
  - flag: --json
    short: "-j"
    type: bool
    description: Append metadata trailer after all records (split mode only)
exit_codes:
  - code: 0
    meaning: Success, including empty input
  - code: 1
    meaning: Invalid JSON, I/O error
  - code: 2
    meaning: Interactive TTY with no input, unknown flag
og_image:
  headline: "JSON arrays to JSONL. And back."
  code: "vrk grab api.example.com/users | vrk jsonl"
mcp_callable: true
