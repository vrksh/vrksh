name: digest
tagline: universal hasher - sha256/md5/sha512, --hmac, --compare
meta_description: "Hash anything with sha256, md5, or sha512. Verify with --compare. Sign with --hmac. One tool, no flags to memorize."
og_title: "vrk digest - hash, verify, and HMAC from the command line"
description: |
  `vrk digest` hashes with SHA-256 (default), MD5, or SHA-512. Works the same on macOS and Linux. Compare file hashes with `--compare`, compute HMACs with `--hmac`, and verify them with `--verify`. Uses constant-time comparison for verification to resist timing attacks.
problem: >
  `sha256sum` exists on Linux but not macOS. `shasum -a 256` exists on macOS
  but the output format differs. A verification script that works locally breaks
  on the other OS. For HMAC, `openssl dgst` exists but the flag syntax is hostile
  and differs across versions.
before: |
  # macOS: shasum -a 256 file.tar.gz
  # Linux: sha256sum file.tar.gz
  # Different output formats, different commands
after: "vrk digest --file file.tar.gz"
group: v1
category: utilities
example: "vrk digest --file release.tar.gz --compare"
flags:
  - flag: --algo
    short: "-a"
    type: string
    description: "Hash algorithm: sha256, md5, sha512"
  - flag: --bare
    short: "-b"
    type: bool
    description: "Output hex hash only, without algo: prefix"
  - flag: --file
    short: ""
    type: "[]string"
    description: Path to file to hash (repeatable)
  - flag: --compare
    short: ""
    type: bool
    description: Compare hashes of all --file inputs
  - flag: --hmac
    short: ""
    type: bool
    description: Compute HMAC instead of plain hash
  - flag: --key
    short: "-k"
    type: string
    description: HMAC secret key (required with --hmac)
  - flag: --verify
    short: ""
    type: string
    description: Known HMAC hex to verify against
  - flag: --json
    short: "-j"
    type: bool
    description: Emit JSON object instead of algo:hash line
  - flag: --quiet
    short: "-q"
    type: bool
    description: Suppress stderr output
exit_codes:
  - code: 0
    meaning: Success, hash written, or --verify matched
  - code: 1
    meaning: File not found, read error, or --verify mismatch
  - code: 2
    meaning: Unknown algorithm, --hmac without --key, --verify without --hmac
og_image:
  headline: "Hash anything. Verify signatures."
  code: "vrk digest --hmac --key secret --verify $SIG"
mcp_callable: true
