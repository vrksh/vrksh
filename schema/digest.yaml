name: digest
tagline: universal hasher - sha256/md5/sha512, --hmac, --compare
description: |
  Hashes strings, stdin, or files with SHA-256, MD5, or SHA-512. Also computes HMACs for verifying webhook signatures with constant-time comparison, so timing attacks are not a concern. Streams input, so it handles files of any size without loading them into memory.
problem: >
  You need to verify a webhook signature or compare file hashes and the openssl
  command is different for HMAC vs plain hash. You forget the -binary flag, get
  hex-encoded input to the HMAC, and the signature never matches.
before: |
  echo -n "$PAYLOAD" | openssl dgst -sha256 -hmac "$WEBHOOK_SECRET" -binary | xxd -p
  # -binary is easy to forget; without it you HMAC the hex string, not the bytes
  # output format differs between openssl versions
after: "echo -n \"$PAYLOAD\" | vrk digest --hmac --key \"$WEBHOOK_SECRET\" --bare"
group: v1
category: utilities
example: vrk digest 'hello'
flags:
  - flag: --algo
    short: "-a"
    type: string
    description: "Hash algorithm: sha256, md5, sha512"
  - flag: --bare
    short: "-b"
    type: bool
    description: "Output hex hash only, without algo: prefix"
  - flag: --file
    short: ""
    type: "[]string"
    description: Path to file to hash (repeatable)
  - flag: --compare
    short: ""
    type: bool
    description: Compare hashes of all --file inputs
  - flag: --hmac
    short: ""
    type: bool
    description: Compute HMAC instead of plain hash
  - flag: --key
    short: "-k"
    type: string
    description: HMAC secret key (required with --hmac)
  - flag: --verify
    short: ""
    type: string
    description: Known HMAC hex to verify against
  - flag: --json
    short: "-j"
    type: bool
    description: Emit JSON object instead of algo:hash line
  - flag: --quiet
    short: "-q"
    type: bool
    description: Suppress stderr output
exit_codes:
  - code: 0
    meaning: Success, hash written, or --verify matched
  - code: 1
    meaning: File not found, read error, or --verify mismatch
  - code: 2
    meaning: Unknown algorithm, --hmac without --key, --verify without --hmac
og_image:
  headline: "Hash anything. Verify signatures."
  code: "vrk digest --hmac --key secret --verify $SIG"
mcp_callable: true
