name: bare
tagline: symlink creator - use vrksh tools without the vrk prefix
meta_description: "Create symlinks for any vrk tool. Use tok, grab, prompt directly without the vrk prefix."
og_title: "vrk bare - use vrksh tools without the vrk prefix"
description: |
  Lets you call any vrksh tool by name without the vrk prefix. Instead of vrk tok, vrk jwt, vrk epoch, you just type tok, jwt, epoch. It creates symlinks in the same directory as the binary - nothing is copied, nothing is installed elsewhere.
problem: >
  Every vrksh command requires the vrk prefix. In interactive sessions you type
  vrk tok, vrk jwt, vrk epoch dozens of times a day. The prefix adds friction
  without adding clarity.
before: |
  alias tok='vrk tok'
  alias jwt='vrk jwt'
  alias epoch='vrk epoch'
  # repeat for 28 tools...
after: "vrk bare"
group: v1
category: meta
example: vrk --bare --dry-run
flags:
  - flag: --force
    short: ""
    type: bool
    description: Overwrite existing files at symlink paths
  - flag: --remove
    short: ""
    type: bool
    description: Remove bare symlinks (only those pointing to vrk)
  - flag: --list
    short: ""
    type: bool
    description: List currently active bare symlinks
  - flag: --dry-run
    short: ""
    type: bool
    description: Show what would happen, make no changes
exit_codes:
  - code: 0
    meaning: Success
  - code: 1
    meaning: Filesystem error creating or removing symlinks
  - code: 2
    meaning: Usage error
og_image:
  headline: "Drop the prefix. Call tools directly."
  code: "vrk --bare && tok --budget 4000 < prompt.txt"
mcp_callable: false
