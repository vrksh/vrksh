name: sse
tagline: SSE stream parser - text/event-stream to JSONL
meta_description: "Parse Server-Sent Event streams into JSONL. Turns text/event-stream into structured records you can pipe."
meta_lead: "vrk sse parses Server-Sent Event streams into clean JSONL records for pipeline processing."
og_title: "vrk sse - parse SSE streams into structured JSONL"
description: |
  `vrk sse` parses `text/event-stream` into clean JSONL records. It handles `data:` prefixes, blank-line event delimiters, multi-line data concatenation, and `[DONE]` sentinel detection used by both Anthropic and OpenAI. `--field` with dot-path syntax drills into nested JSON to extract just the text fragments.
problem: >
  A streaming LLM endpoint returns raw Server-Sent Events: `data:` prefixes, blank
  lines as delimiters, `[DONE]` sentinels. `grep '^data:' | sed 's/^data: //'`
  works until a data field spans multiple lines. The sed breaks and the streamed
  response has gaps.
before: |
  curl -sN https://api.example.com/stream | \
    grep '^data: ' | sed 's/^data: //' | grep -v '^\[DONE\]$'
  # breaks on multi-line data fields
  # loses event types and IDs
after: "curl -sN https://api.example.com/stream | vrk sse"
group: v1
category: pipeline
example: "curl -sN $API_URL | vrk sse --field data.delta.text"
flags:
  - flag: --event
    short: "-e"
    type: string
    description: Only emit events of this type
  - flag: --field
    short: "-F"
    type: string
    description: Extract dot-path field from record as plain text
exit_codes:
  - code: 0
    meaning: Success, including clean [DONE] termination
  - code: 1
    meaning: I/O error reading stdin
  - code: 2
    meaning: Usage error - interactive terminal with no piped input, unknown flag
og_image:
  headline: "Parse SSE streams. Get clean JSONL."
  code: "curl -sN https://api.example.com/stream | vrk sse"
mcp_callable: true
