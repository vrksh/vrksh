name: completions
tagline: shell completion script generator - bash, zsh, fish
description: |
  Generate shell completion scripts for Bash, Zsh, and Fish. Tab-completes
  tool names and their flags. Generated from the tool registry inside the
  binary, so it always matches the exact version you are running.
group: v1
category: meta
example: vrk completions bash > ~/.bash_completion.d/vrk
flags:
  - flag: --json
    short: "-j"
    type: bool
    description: Emit errors as JSON
exit_codes:
  - code: 0
    meaning: Script emitted to stdout
  - code: 1
    meaning: Unknown shell argument
  - code: 2
    meaning: No shell argument provided
og_image:
  headline: "Tab-complete every tool. Every flag."
  code: "vrk completions bash > ~/.bash_completion.d/vrk"
mcp_callable: false
