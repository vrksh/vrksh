name: completions
tagline: shell completion script generator - bash, zsh, fish
meta_description: "Generate shell completion scripts for bash, zsh, and fish. Tab-complete every vrk tool and flag."
meta_lead: "vrk completions generates tab-completion scripts for bash, zsh, and fish."
og_title: "vrk completions - shell completion for bash, zsh, and fish"
description: |
  `vrk completions` generates tab-completion scripts for bash, zsh, and fish. After installing, `vrk <tab>` completes tool names and `vrk tok --<tab>` completes flags. The completions are generated from the binary itself, so they always match the installed version.
problem: >
  A multicall binary has 26 tool names and hundreds of flags. Without tab completion
  you are guessing names and checking `--help` constantly.
before: |
  # write a bash completion script by hand
  _vrk_complete() {
    COMPREPLY=($(compgen -W "tok jwt epoch ..." -- "${COMP_WORDS[1]}"))
  }
  complete -F _vrk_complete vrk
after: "vrk completions bash > ~/.bash_completion.d/vrk"
group: v1
category: meta
example: vrk completions bash > ~/.bash_completion.d/vrk
flags:
  - flag: --json
    short: "-j"
    type: bool
    description: Emit errors as JSON
exit_codes:
  - code: 0
    meaning: Script emitted to stdout
  - code: 1
    meaning: Unknown shell argument
  - code: 2
    meaning: No shell argument provided
og_image:
  headline: "Tab-complete every tool. Every flag."
  code: "vrk completions bash > ~/.bash_completion.d/vrk"
mcp_callable: false
