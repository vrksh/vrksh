name: validate
tagline: JSONL schema validator - --schema, --strict, --fix, --json
meta_description: "vrk validate checks LLM JSON output against a schema and exits 1 on mismatch. The pipeline stops before bad data reaches downstream systems. No error-handling code required."
og_title: "vrk validate - schema validation for LLM JSON output"
description: |
  Your LLM returns JSON that looks right but isn't. The `sentiment` field is sometimes a string, sometimes a number. The `confidence` key is missing on 3% of responses. You don't catch it until a downstream aggregation script crashes at 2 AM on 847 records that slipped through without the required fields.

  `vrk validate` checks every JSON record in a JSONL stream against a type schema. Valid records pass through to stdout. Invalid records are dropped with a warning to stderr. Use `--strict` to halt the pipeline on the first bad record. Use `--fix` to send invalid records to an LLM for repair.
problem: >
  You ask an LLM to return {"sentiment":"string","confidence":"number"} for
  500 product reviews. 487 responses are perfect. 13 return confidence as a string
  instead of a number. Your Python analysis script crashes on float("high"). You
  re-run the entire pipeline because you didn't validate between the LLM and the database.
before: |
  cat records.jsonl | while read line; do
    echo "$line" | jq -e '.name | type == "string"' > /dev/null && \
    echo "$line" | jq -e '.age | type == "number"' > /dev/null && \
    echo "$line"
  done
after: "cat records.jsonl | vrk validate --schema '{\"name\":\"string\",\"age\":\"number\"}'"
group: v1
category: pipeline
example: "cat llm-output.jsonl | vrk validate --schema '{\"sentiment\":\"string\",\"confidence\":\"number\"}' --strict"
flags:
  - flag: --schema
    short: "-s"
    type: string
    description: JSON schema inline or path to .json file (required)
  - flag: --strict
    short: ""
    type: bool
    description: Exit 1 on first invalid record
  - flag: --fix
    short: ""
    type: bool
    description: Send invalid records to vrk prompt for repair
  - flag: --json
    short: "-j"
    type: bool
    description: Append metadata trailer after all output
  - flag: --quiet
    short: "-q"
    type: bool
    description: Suppress stderr output
exit_codes:
  - code: 0
    meaning: All records passed
  - code: 1
    meaning: Record failed in --strict mode, or scanner error
  - code: 2
    meaning: --schema missing, schema JSON invalid, unknown flag
meta_title: "vrk validate - JSON Schema Validator for Pipelines"
meta_lead: "vrk validate is a JSON schema validator for shell pipelines - exit 1 on mismatch stops the pipeline before bad data propagates."
og_image:
  headline: "Validate JSON. Stop bad data early."
  code: "vrk validate --schema spec.json --strict < records.jsonl"
mcp_callable: true
