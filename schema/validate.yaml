name: validate
tagline: JSONL schema validator - --schema, --strict, --fix, --json
description: |
  Checks every JSON record in a stream against a schema you provide. Valid records pass through to stdout. Invalid ones are dropped with a warning so downstream tools only see clean data. Use --strict to halt on the first bad record instead of skipping it.
problem: >
  You have a JSONL stream and need to ensure every record matches a schema before it
  enters your database. jq can check types but the expressions get unreadable fast.
  A bad record slips through and corrupts downstream aggregations.
before: |
  cat records.jsonl | while read line; do
    echo "$line" | jq -e '.name | type == "string"' > /dev/null && \
    echo "$line" | jq -e '.age | type == "number"' > /dev/null && \
    echo "$line"
  done
after: "cat records.jsonl | vrk validate --schema '{\"name\":\"string\",\"age\":\"number\"}'"
group: v1
category: pipeline
example: cat records.jsonl | vrk validate --schema '{"name":"string","age":"number"}' --strict
flags:
  - flag: --schema
    short: "-s"
    type: string
    description: JSON schema inline or path to .json file (required)
  - flag: --strict
    short: ""
    type: bool
    description: Exit 1 on first invalid record
  - flag: --fix
    short: ""
    type: bool
    description: Send invalid records to vrk prompt for repair
  - flag: --json
    short: "-j"
    type: bool
    description: Append metadata trailer after all output
  - flag: --quiet
    short: "-q"
    type: bool
    description: Suppress stderr output
exit_codes:
  - code: 0
    meaning: All records passed
  - code: 1
    meaning: Record failed in --strict mode, or scanner error
  - code: 2
    meaning: --schema missing, schema JSON invalid, unknown flag
og_image:
  headline: "Validate JSON. Stop bad data early."
  code: "vrk validate --schema spec.json --strict < records.jsonl"
mcp_callable: true
