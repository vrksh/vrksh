name: epoch
tagline: timestamp converter - unix/ISO, relative time
meta_description: "Convert between Unix timestamps and ISO dates. Supports relative time like +3d or -1h."
og_title: "vrk epoch - Unix timestamp and ISO date converter"
description: |
  Converts between Unix timestamps and human-readable dates. You can pass a timestamp, an ISO date, or a relative offset like +3d or -1h. Works the same on macOS and Linux, unlike the date command which differs between platforms.
problem: >
  You have a Unix timestamp from an API response and need to know what date it is.
  The date command syntax differs between macOS and Linux. date -d works on Linux,
  date -r works on macOS, and neither handles relative offsets like "+3d" natively.
before: |
  # Linux
  date -d @1740009600
  # macOS
  date -r 1740009600
  # relative? write Python
after: "vrk epoch 1740009600 --iso"
group: v1
category: utilities
example: vrk epoch 1740009600 --iso
flags:
  - flag: --iso
    short: ""
    type: bool
    description: Output as ISO 8601 string instead of Unix integer
  - flag: --json
    short: "-j"
    type: bool
    description: Emit JSON with all representations
  - flag: --tz
    short: ""
    type: string
    description: Timezone for --iso or --json output (IANA name or offset)
  - flag: --now
    short: ""
    type: bool
    description: Print current Unix timestamp without reading stdin
  - flag: --at
    short: ""
    type: string
    description: Reference timestamp for relative input (makes scripts deterministic)
  - flag: --quiet
    short: "-q"
    type: bool
    description: Suppress stderr output
exit_codes:
  - code: 0
    meaning: Success
  - code: 1
    meaning: Runtime error (I/O failure)
  - code: 2
    meaning: Unsupported format, ambiguous timezone, --tz without --iso/--json
og_image:
  headline: "Convert timestamps. Unix, ISO, relative."
  code: "vrk epoch 1740009600 --iso"
mcp_callable: true
