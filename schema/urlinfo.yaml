name: urlinfo
tagline: URL parser - scheme, host, port, path, query, --field
description: |
  Breaks URLs into their components - scheme, host, port, path, query parameters - as structured JSON. You can extract a single piece with --field, including nested query parameters using dot-path syntax. Pure parsing, no network calls.
problem: >
  You have a URL from an API response and need to extract a query parameter to pass
  to the next pipeline step. Splitting on ? and & in bash is fragile - encoded characters,
  missing parameters, and multiple values for the same key all break your parsing.
before: |
  URL="https://api.example.com/callback?code=abc123&state=xyz"
  echo "$URL" | grep -oP 'code=\K[^&]+'
  # breaks if code= is missing (grep exits 1, pipeline fails)
  # breaks on percent-encoded values like code=abc%3D123
  # not portable: -P (Perl regex) is GNU grep only
after: "echo \"$URL\" | vrk urlinfo --field query.code"
group: v1
category: utilities
example: echo 'https://api.example.com:8443/v2/users?page=2' | vrk urlinfo
flags:
  - flag: --field
    short: "-F"
    type: string
    description: Extract a single field as plain text (supports dot-path for query params)
  - flag: --json
    short: "-j"
    type: bool
    description: Append metadata trailer
  - flag: --quiet
    short: "-q"
    type: bool
    description: Suppress stderr output
exit_codes:
  - code: 0
    meaning: Success
  - code: 1
    meaning: Invalid URL that cannot be parsed, I/O error
  - code: 2
    meaning: Interactive TTY with no stdin or positional arg
og_image:
  headline: "Parse URLs. Extract any component."
  code: "vrk urlinfo --field host < urls.txt"
mcp_callable: true
