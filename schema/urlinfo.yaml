name: urlinfo
tagline: URL parser - scheme, host, port, path, query, --field
meta_description: "Parse URLs and extract components. Get scheme, host, path, query params, or any field individually."
meta_lead: "vrk urlinfo parses URLs into structured JSON components with dot-path field extraction."
og_title: "vrk urlinfo - URL parser and component extractor"
description: |
  `vrk urlinfo` parses URLs into structured JSON components: scheme, host, port, path, query parameters, fragment, and user. `--field` with dot-path syntax extracts a single component. Handles edge cases that regex approaches miss. No network calls, pure parsing.
problem: >
  `cut -d'/' -f3` extracts a hostname until a URL has a port number or basic auth.
  `https://api.example.com:8080/path` returns "api.example.com:8080" including
  the port. A URL with `user:pass@host` breaks the regex entirely. The 10% of
  URLs that don't fit a simple pattern break the pipeline.
before: |
  echo 'https://api.example.com:8080/path?q=test' | cut -d'/' -f3
  # Returns "api.example.com:8080" - includes port
after: "vrk urlinfo --field host 'https://api.example.com:8080/path?q=test'"
group: v1
category: utilities
example: "vrk urlinfo 'https://api.example.com:8080/v1/search?q=llm+tools&limit=10'"
flags:
  - flag: --field
    short: "-F"
    type: string
    description: Extract a single field as plain text (supports dot-path for query params)
  - flag: --json
    short: "-j"
    type: bool
    description: Append metadata trailer
  - flag: --quiet
    short: "-q"
    type: bool
    description: Suppress stderr output
exit_codes:
  - code: 0
    meaning: Success
  - code: 1
    meaning: Invalid URL that cannot be parsed, I/O error
  - code: 2
    meaning: Interactive TTY with no stdin or positional arg
og_image:
  headline: "Parse URLs. Extract any component."
  code: "vrk urlinfo --field host < urls.txt"
mcp_callable: true
