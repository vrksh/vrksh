name: urlinfo
tagline: URL parser - scheme, host, port, path, query, --field
meta_description: "Parse URLs and extract components. Get scheme, host, path, query params, or any field individually."
og_title: "vrk urlinfo - URL parser and component extractor"
description: |
  You need to extract the hostname from a URL in a shell script. You reach for `cut -d'/' -f3` and it works until someone passes a URL with a port number or a username. You try sed with a regex and it handles 90% of cases. The other 10% break your pipeline when real URLs arrive.

  `vrk urlinfo` parses URLs into structured JSON components: scheme, host, port, path, query parameters, fragment, and user. Use `--field` with dot-path syntax to extract a single component. Handles edge cases that regex approaches miss. No network calls - pure parsing.
problem: >
  You're processing a list of URLs and need to group them by domain. You extract
  the hostname with cut -d'/' -f3. A URL has a port number: https://api.example.com:8080/path.
  Cut returns "api.example.com:8080" including the port. Your grouping breaks.
  Another URL has basic auth in it. Your regex didn't account for @ symbols.
before: |
  echo 'https://api.example.com:8080/path?q=test' | cut -d'/' -f3
  # Returns "api.example.com:8080" - includes port
after: "vrk urlinfo --field host 'https://api.example.com:8080/path?q=test'"
group: v1
category: utilities
example: "vrk urlinfo 'https://api.example.com:8080/v1/search?q=llm+tools&limit=10'"
flags:
  - flag: --field
    short: "-F"
    type: string
    description: Extract a single field as plain text (supports dot-path for query params)
  - flag: --json
    short: "-j"
    type: bool
    description: Append metadata trailer
  - flag: --quiet
    short: "-q"
    type: bool
    description: Suppress stderr output
exit_codes:
  - code: 0
    meaning: Success
  - code: 1
    meaning: Invalid URL that cannot be parsed, I/O error
  - code: 2
    meaning: Interactive TTY with no stdin or positional arg
og_image:
  headline: "Parse URLs. Extract any component."
  code: "vrk urlinfo --field host < urls.txt"
mcp_callable: true
