name: urlinfo
tagline: URL parser - scheme, host, port, path, query, --field
description: |
  Decompose URLs into structured JSON. Extract individual components
  with --field, including nested query parameters via dot-path syntax.
  Pure string parser - no network calls, no DNS lookups.
group: v1
category: utilities
example: echo 'https://api.example.com:8443/v2/users?page=2' | vrk urlinfo
flags:
  - flag: --field
    short: "-F"
    type: string
    description: Extract a single field as plain text (supports dot-path for query params)
  - flag: --json
    short: "-j"
    type: bool
    description: Append metadata trailer
  - flag: --quiet
    short: "-q"
    type: bool
    description: Suppress stderr output
exit_codes:
  - code: 0
    meaning: Success
  - code: 1
    meaning: Invalid URL that cannot be parsed, I/O error
  - code: 2
    meaning: Interactive TTY with no stdin or positional arg
og_image:
  headline: "Parse URLs. Extract any component."
  code: "vrk urlinfo --field host < urls.txt"
mcp_callable: true
