name: links
tagline: hyperlink extractor - markdown, HTML, bare URLs to JSONL
meta_description: "Extract every hyperlink from markdown, HTML, or plain text. JSONL output with text, URL, and line number."
og_title: "vrk links - extract hyperlinks from markdown and HTML"
description: |
  You need to find every URL in a document - markdown links, HTML anchors, and bare URLs scattered through prose. You write a regex and it misses reference-style markdown links. You add another regex and it matches URLs inside code blocks that aren't real links.

  `vrk links` extracts hyperlinks from markdown, HTML, or plain text and outputs one JSONL record per link with the link text, URL, and line number. Handles inline links, reference-style links, HTML anchor tags, and bare URLs. Use `--bare` for just the URLs, one per line.
problem: >
  You need to extract all links from a markdown file. grep finds bare URLs but misses
  markdown links. A Python script with regex handles inline links but misses reference-style
  links. You end up with partial results and no line numbers.
before: |
  grep -oE 'https?://[^ ]+' README.md
  # misses [text](url) markdown links
  # misses [text][ref] reference links
  # no line numbers, no link text
after: "cat README.md | vrk links"
group: v1
category: utilities
example: "vrk grab https://example.com/docs | vrk links --bare"
flags:
  - flag: --bare
    short: "-b"
    type: bool
    description: Output URLs only, one per line
  - flag: --json
    short: "-j"
    type: bool
    description: Append metadata trailer after all records
  - flag: --quiet
    short: "-q"
    type: bool
    description: Suppress stderr output
exit_codes:
  - code: 0
    meaning: Success, including empty input and documents with no links
  - code: 1
    meaning: I/O error reading stdin
  - code: 2
    meaning: Interactive TTY with no piped input, unknown flag
og_image:
  headline: "Extract every link. Markdown, HTML, bare URLs."
  code: "cat README.md | vrk links --bare"
mcp_callable: true
