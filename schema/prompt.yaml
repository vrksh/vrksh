name: prompt
tagline: LLM prompt - Anthropic/OpenAI, --schema, --retry, --explain.
description: |
  Sends a prompt to an LLM and prints the response to stdout. Works with Anthropic and OpenAI APIs. You pipe content in, optionally set a system prompt, and get the response back - no curl commands, no JSON escaping, no response parsing. Temperature defaults to 0 for deterministic output.
problem: >
  You need to call an LLM from a shell script. You write a curl command with JSON
  escaping, header management, and response parsing. The prompt changes and you
  break the JSON. The API returns an error and you parse it wrong.
before: |
  curl -s https://api.anthropic.com/v1/messages \
    -H "x-api-key: $ANTHROPIC_API_KEY" \
    -H "content-type: application/json" \
    -d '{"model":"claude-sonnet-4-6","max_tokens":1024,"messages":[{"role":"user","content":"Summarize this"}]}'
after: "cat article.md | vrk prompt --system 'Summarize this' --model claude-sonnet-4-6"
group: v1
category: core
example: cat article.md | vrk prompt --system 'Summarize this' --model claude-sonnet-4-6 --json
flags:
  - flag: --model
    short: "-m"
    type: string
    description: LLM model (default from VRK_DEFAULT_MODEL or claude-sonnet-4-6)
  - flag: --system
    short: ""
    type: string
    description: System prompt text, or @file.txt to read from file
  - flag: --budget
    short: ""
    type: int
    description: Exit 1 if prompt exceeds N tokens
  - flag: --fail
    short: "-f"
    type: bool
    description: Fail on non-2xx API response or schema mismatch
  - flag: --json
    short: "-j"
    type: bool
    description: Emit response as JSON envelope with metadata
  - flag: --quiet
    short: "-q"
    type: bool
    description: Suppress stderr output
  - flag: --schema
    short: "-s"
    type: string
    description: JSON schema for response validation
  - flag: --explain
    short: ""
    type: bool
    description: Print equivalent curl command, no API call
  - flag: --retry
    short: ""
    type: int
    description: Retry N times on schema mismatch (escalates temperature)
  - flag: --endpoint
    short: ""
    type: string
    description: OpenAI-compatible API base URL
exit_codes:
  - code: 0
    meaning: Success
  - code: 1
    meaning: API failure, budget exceeded, or schema mismatch
  - code: 2
    meaning: Usage error - no input, missing flags
og_image:
  headline: "Pipe text to any LLM. Validate the response."
  code: "vrk prompt -m claude-sonnet-4-6 --schema spec.json"
mcp_callable: true
