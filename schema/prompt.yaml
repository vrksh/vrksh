name: prompt
tagline: LLM prompt - Anthropic/OpenAI, --schema, --retry, --explain.
meta_description: "Pipe text to Claude or GPT from your terminal. Schema validation, retries, deterministic output."
og_title: "vrk prompt - pipe text to any LLM from your terminal"
description: |
  `vrk prompt` pipes text to Claude or GPT and prints the response to stdout. Set `ANTHROPIC_API_KEY` or `OPENAI_API_KEY`, pipe in content, get back plain text. No curl, no JSON escaping, no response parsing. Temperature defaults to 0 for deterministic output. `--schema` validates the response against a JSON schema. `--retry` retries failed validations with escalating temperature.
problem: >
  Calling an LLM from a shell script means a curl command with JSON escaping,
  content-type headers, API key management, and response extraction. A backtick
  in the input breaks the JSON. A 429 response makes the jq pipeline print `null`.
  You spend more time on HTTP plumbing than on the actual task.
before: |
  curl -s https://api.anthropic.com/v1/messages \
    -H "x-api-key: $ANTHROPIC_API_KEY" \
    -H "content-type: application/json" \
    -d '{"model":"claude-sonnet-4-6","max_tokens":1024,"messages":[{"role":"user","content":"Summarize this"}]}'
after: "cat article.md | vrk prompt --system 'Summarize this' --model claude-sonnet-4-6"
group: v1
category: core
example: cat article.md | vrk prompt --system 'Summarize the key findings in 3 bullet points'
flags:
  - flag: --model
    short: "-m"
    type: string
    description: LLM model (default from VRK_DEFAULT_MODEL or claude-sonnet-4-6)
  - flag: --system
    short: ""
    type: string
    description: System prompt text, or @file.txt to read from file
  - flag: --field
    short: ""
    type: string
    description: Dot-path field in each JSONL line to use as prompt text
    example: text
  - flag: --budget
    short: ""
    type: int
    description: Exit 1 if prompt exceeds N tokens
  - flag: --fail
    short: "-f"
    type: bool
    description: Fail on non-2xx API response or schema mismatch
  - flag: --json
    short: "-j"
    type: bool
    description: Emit response as JSON envelope with metadata
  - flag: --quiet
    short: "-q"
    type: bool
    description: Suppress stderr output
  - flag: --schema
    short: "-s"
    type: string
    description: JSON schema for response validation
  - flag: --explain
    short: ""
    type: bool
    description: Print equivalent curl command, no API call
  - flag: --retry
    short: ""
    type: int
    description: Retry N times on schema mismatch (escalates temperature)
  - flag: --endpoint
    short: ""
    type: string
    description: OpenAI-compatible API base URL
exit_codes:
  - code: 0
    meaning: Success
  - code: 1
    meaning: API failure, budget exceeded, schema mismatch, invalid JSONL, field not found
  - code: 2
    meaning: Usage error - no input, missing flags, --field with --explain
og_image:
  headline: "Pipe text to any LLM. Validate the response."
  code: "vrk prompt -m claude-sonnet-4-6 --schema spec.json"
mcp_callable: true
