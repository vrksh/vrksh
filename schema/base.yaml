name: base
tagline: encoding converter - base64, base64url, hex, base32
description: |
  Encodes and decodes between base64, base64url, hex, and base32. Works identically on macOS and Linux - no more remembering whether it is base64 -D or base64 -d. Two subcommands: encode and decode.
problem: >
  You write a deploy script that base64-decodes a secret on macOS. It works. CI runs
  on Linux and fails because macOS uses base64 -D while Linux uses base64 -d. You add
  an OS check and now your three-line decode is twelve lines.
before: |
  if [[ "$OSTYPE" == "darwin"* ]]; then
    echo "$ENCODED" | base64 -D
  else
    echo "$ENCODED" | base64 -d
  fi
after: "echo \"$ENCODED\" | vrk base decode --from base64"
group: v1
category: utilities
example: echo 'hello' | vrk base encode --to base64
flags:
  - flag: --to
    short: ""
    type: string
    description: "Target encoding: base64, base64url, hex, base32 (encode subcommand)"
  - flag: --from
    short: ""
    type: string
    description: "Source encoding: base64, base64url, hex, base32 (decode subcommand)"
  - flag: --quiet
    short: "-q"
    type: bool
    description: Suppress stderr output
exit_codes:
  - code: 0
    meaning: Success
  - code: 1
    meaning: Invalid encoded input (bad characters, wrong padding)
  - code: 2
    meaning: Missing subcommand, --to/--from missing or unsupported
og_image:
  headline: "Encode and decode. base64, hex, base32."
  code: "echo 'hello' | vrk base encode --to base64"
mcp_callable: true
