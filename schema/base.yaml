name: base
tagline: encoding converter - base64, base64url, hex, base32
meta_description: "Encode and decode base64, base64url, hex, and base32 from the command line. No more openssl flags."
og_title: "vrk base - base64, hex, and base32 encoding in one tool"
description: |
  `base64` behaves differently on macOS and Linux. On macOS it wraps at 76 characters. On Linux it doesn't. `base64 -d` on macOS is `base64 --decode` on Linux. You write a script that works on your Mac and it breaks in CI.

  `vrk base` encodes and decodes base64, base64url, hex, and base32 with identical behavior on every platform. Two subcommands: `encode` and `decode`. Strips one trailing newline from stdin so `echo` input works correctly.
problem: >
  You base64-encode a value in a script. On macOS, base64 wraps output at 76
  characters. Your downstream parser chokes on the line breaks. You add -w0
  but that flag doesn't exist on macOS. You're now maintaining platform-specific
  branches for a one-line encoding operation.
before: |
  # macOS
  echo 'hello' | base64
  # Linux
  echo 'hello' | base64 -w0
  # Different flags, different output
after: "echo 'hello' | vrk base encode --to base64"
group: v1
category: utilities
example: "echo 'hello' | vrk base encode --to base64"
flags:
  - flag: --to
    short: ""
    type: string
    description: "Target encoding: base64, base64url, hex, base32 (encode subcommand)"
  - flag: --from
    short: ""
    type: string
    description: "Source encoding: base64, base64url, hex, base32 (decode subcommand)"
  - flag: --quiet
    short: "-q"
    type: bool
    description: Suppress stderr output
exit_codes:
  - code: 0
    meaning: Success
  - code: 1
    meaning: Invalid encoded input (bad characters, wrong padding)
  - code: 2
    meaning: Missing subcommand, --to/--from missing or unsupported
og_image:
  headline: "Encode and decode. base64, hex, base32."
  code: "echo 'hello' | vrk base encode --to base64"
mcp_callable: true
