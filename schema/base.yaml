name: base
tagline: encoding converter - base64, base64url, hex, base32
meta_description: "Encode and decode base64, base64url, hex, and base32 from the command line. No more openssl flags."
meta_lead: "vrk base encodes and decodes base64, base64url, hex, and base32 with identical behavior on every platform."
og_title: "vrk base - base64, hex, and base32 encoding in one tool"
description: |
  `vrk base` encodes and decodes base64, base64url, hex, and base32 with identical behavior on every platform. Two subcommands: `encode` and `decode`. Strips one trailing newline from stdin so `echo` input works correctly. No platform-specific flags to remember.
problem: >
  `base64` behaves differently on macOS and Linux. macOS wraps output at 76
  characters. `-w0` disables wrapping on Linux but does not exist on macOS.
  `-d` means decode on macOS, `--decode` on Linux. A script that works locally
  breaks in CI on a different OS.
before: |
  # macOS
  echo 'hello' | base64
  # Linux
  echo 'hello' | base64 -w0
  # Different flags, different output
after: "echo 'hello' | vrk base encode --to base64"
group: v1
category: utilities
example: "echo 'hello' | vrk base encode --to base64"
flags:
  - flag: --to
    short: ""
    type: string
    description: "Target encoding: base64, base64url, hex, base32 (encode subcommand)"
  - flag: --from
    short: ""
    type: string
    description: "Source encoding: base64, base64url, hex, base32 (decode subcommand)"
  - flag: --quiet
    short: "-q"
    type: bool
    description: Suppress stderr output
exit_codes:
  - code: 0
    meaning: Success
  - code: 1
    meaning: Invalid encoded input (bad characters, wrong padding)
  - code: 2
    meaning: Missing subcommand, --to/--from missing or unsupported
og_image:
  headline: "Encode and decode. base64, hex, base32."
  code: "echo 'hello' | vrk base encode --to base64"
mcp_callable: true
