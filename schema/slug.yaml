name: slug
tagline: URL/filename slug generator - --separator, --max, --json
meta_description: "Generate URL-safe slugs from any text. Handles unicode, custom separators, and length limits."
og_title: "vrk slug - URL and filename slug generator"
description: |
  `vrk slug` converts any text to a URL-safe, filename-safe slug. Normalizes Unicode to ASCII, lowercases, replaces non-alphanumeric characters with hyphens, and collapses consecutive hyphens. `--max` truncates at word boundaries for length-limited contexts.
problem: >
  A slugify function turns "Uber's $3.1B Q4 Revenue" into "uber-s--3-1b-q4-revenue"
  with a double hyphen. Another title has Unicode characters that pass through
  unchanged and break a downstream system expecting ASCII-only paths. `tr` and
  `sed` handle simple cases but miss edge cases consistently.
before: |
  echo "$TITLE" | tr '[:upper:]' '[:lower:]' | tr ' ' '-' | tr -cd 'a-z0-9-'
  # Misses Unicode normalization, doesn't collapse double hyphens
after: "echo $TITLE | vrk slug"
group: v1
category: utilities
example: "echo 'My Blog Post: A Deep Dive into LLM Pipelines!' | vrk slug"
flags:
  - flag: --separator
    short: ""
    type: string
    description: Word separator character or string
  - flag: --max
    short: ""
    type: int
    description: Max output length; truncated at last separator (0 = no limit)
  - flag: --json
    short: "-j"
    type: bool
    description: "Emit JSON per line: {input, output}"
  - flag: --quiet
    short: "-q"
    type: bool
    description: Suppress stderr output
exit_codes:
  - code: 0
    meaning: Success
  - code: 1
    meaning: Runtime error (I/O failure)
  - code: 2
    meaning: Interactive TTY with no stdin
og_image:
  headline: "Slugify anything. URL-safe, Unicode-aware."
  code: "echo 'My Article (2024)' | vrk slug"
mcp_callable: true
