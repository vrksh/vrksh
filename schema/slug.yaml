name: slug
tagline: URL/filename slug generator - --separator, --max, --json
meta_description: "Generate URL-safe slugs from any text. Handles unicode, custom separators, and length limits."
og_title: "vrk slug - URL and filename slug generator"
description: |
  Turns arbitrary text into URL-safe slugs. Normalizes Unicode, lowercases everything, and keeps only letters and numbers. Truncates at word boundaries so you don't get cut-off words. Processes one line at a time for batch use.
problem: >
  You need a URL-safe slug from a blog title. You lowercase and replace spaces with
  hyphens, but forget about Unicode, punctuation, and consecutive separators. The
  slug "my--great--post-!" breaks your router.
before: |
  echo 'My Great Post!' | tr '[:upper:]' '[:lower:]' | tr ' ' '-' | tr -cd 'a-z0-9-'
  # consecutive hyphens, no Unicode normalization, no truncation
after: "echo 'My Great Post!' | vrk slug"
group: v1
category: utilities
example: echo 'My Article Title' | vrk slug
flags:
  - flag: --separator
    short: ""
    type: string
    description: Word separator character or string
  - flag: --max
    short: ""
    type: int
    description: Max output length; truncated at last separator (0 = no limit)
  - flag: --json
    short: "-j"
    type: bool
    description: "Emit JSON per line: {input, output}"
  - flag: --quiet
    short: "-q"
    type: bool
    description: Suppress stderr output
exit_codes:
  - code: 0
    meaning: Success
  - code: 1
    meaning: Runtime error (I/O failure)
  - code: 2
    meaning: Interactive TTY with no stdin
og_image:
  headline: "Slugify anything. URL-safe, Unicode-aware."
  code: "echo 'My Article (2024)' | vrk slug"
mcp_callable: true
