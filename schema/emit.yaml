name: emit
tagline: structured logger - wraps stdin lines as JSONL log records
meta_description: "Turn plain text into structured JSONL log records. Add timestamps, levels, and fields to any pipeline output."
og_title: "vrk emit - structured JSONL logging for shell pipelines"
description: |
  Your pipeline prints unstructured text to stdout. Errors, warnings, and info messages all look the same. When something breaks at 3 AM, you grep through a flat text file trying to find the ERROR lines mixed in with thousands of INFO lines. No timestamps. No log levels. No structure.

  `vrk emit` wraps plain text lines into structured JSONL log records with ISO timestamps, log levels, and optional tags. Pipe any command's output through emit and get machine-parseable logs. Use `--parse-level` to auto-detect ERROR/WARN/INFO prefixes from existing output. Use `--tag` to label records by pipeline stage.
problem: >
  Your nightly pipeline runs 5 stages. Each one prints to stdout. When stage 3
  fails, you have 10,000 lines of unstructured text with no timestamps and no way
  to tell which stage produced which line. You add echo statements with dates,
  but the format is inconsistent and grep-hostile.
before: |
  echo "[$(date)] INFO: Processing started"
  echo "[$(date)] ERROR: Connection failed"
  # inconsistent format, hard to parse, no machine-readable structure
after: "run-pipeline | vrk emit --tag pipeline --parse-level"
group: v1
category: utilities
example: "run-pipeline 2>&1 | vrk emit --tag deploy --parse-level"
flags:
  - flag: --level
    short: "-l"
    type: string
    description: "Log level: debug, info, warn, error"
  - flag: --tag
    short: ""
    type: string
    description: Value for the tag field on every record
  - flag: --msg
    short: ""
    type: string
    description: Fixed message override; stdin lines parsed as JSON and merged
  - flag: --parse-level
    short: ""
    type: bool
    description: Auto-detect level from ERROR/WARN/INFO/DEBUG line prefixes
exit_codes:
  - code: 0
    meaning: All non-empty lines emitted as JSONL records
  - code: 1
    meaning: Stdin scanner error or write failure
  - code: 2
    meaning: Interactive TTY with no positional arg, or unknown --level value
og_image:
  headline: "Structured logs. From any pipe."
  code: "vrk coax -- ./deploy.sh | vrk emit --tag deploy"
mcp_callable: true
