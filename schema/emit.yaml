name: emit
tagline: structured logger - wraps stdin lines as JSONL log records
description: |
  Turn unstructured text into timestamped JSONL log records. Each line
  becomes a JSON object with ts, level, and msg fields. Supports tagging
  by source, auto-detecting log level from line prefixes, and merging
  extra JSON fields.
group: v1
category: utilities
example: some-script.sh | vrk emit --level info --tag my-script
flags:
  - flag: --level
    short: "-l"
    type: string
    description: "Log level: debug, info, warn, error"
  - flag: --tag
    short: ""
    type: string
    description: Value for the tag field on every record
  - flag: --msg
    short: ""
    type: string
    description: Fixed message override; stdin lines parsed as JSON and merged
  - flag: --parse-level
    short: ""
    type: bool
    description: Auto-detect level from ERROR/WARN/INFO/DEBUG line prefixes
exit_codes:
  - code: 0
    meaning: All non-empty lines emitted as JSONL records
  - code: 1
    meaning: Stdin scanner error or write failure
  - code: 2
    meaning: Interactive TTY with no positional arg, or unknown --level value
og_image:
  headline: "Structured logs. From any pipe."
  code: "vrk coax -- ./deploy.sh | vrk emit --tag deploy"
mcp_callable: true
