name: emit
tagline: structured logger - wraps stdin lines as JSONL log records
description: |
  Wraps any command's output into structured JSONL log records. Each line gets a timestamp, a level, and a msg field. Pipe a script through emit and you get logs you can actually filter and search, instead of grepping through plain text.
problem: >
  Your script writes plain text to stdout. When something breaks at 3am, you grep
  through unstructured logs trying to find the error. No timestamps, no levels,
  no structured fields to filter on.
before: |
  ./deploy.sh >> pipeline.log 2>&1
  # later: grep "ERROR" pipeline.log
  # no timestamps, no structured fields, no level filtering
  # good luck finding what failed at 3am
after: "./deploy.sh | vrk emit --tag deploy --parse-level"
group: v1
category: utilities
example: some-script.sh | vrk emit --level info --tag my-script
flags:
  - flag: --level
    short: "-l"
    type: string
    description: "Log level: debug, info, warn, error"
  - flag: --tag
    short: ""
    type: string
    description: Value for the tag field on every record
  - flag: --msg
    short: ""
    type: string
    description: Fixed message override; stdin lines parsed as JSON and merged
  - flag: --parse-level
    short: ""
    type: bool
    description: Auto-detect level from ERROR/WARN/INFO/DEBUG line prefixes
exit_codes:
  - code: 0
    meaning: All non-empty lines emitted as JSONL records
  - code: 1
    meaning: Stdin scanner error or write failure
  - code: 2
    meaning: Interactive TTY with no positional arg, or unknown --level value
og_image:
  headline: "Structured logs. From any pipe."
  code: "vrk coax -- ./deploy.sh | vrk emit --tag deploy"
mcp_callable: true
