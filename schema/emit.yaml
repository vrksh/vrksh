name: emit
tagline: structured logger - wraps stdin lines as JSONL log records
meta_description: "Turn plain text into structured JSONL log records. Add timestamps, levels, and fields to any pipeline output."
meta_lead: "vrk emit wraps plain text lines into structured JSONL log records with ISO timestamps and log levels."
og_title: "vrk emit - structured JSONL logging for shell pipelines"
description: |
  `vrk emit` wraps plain text lines into structured JSONL log records with ISO timestamps, log levels, and tags. Pipe any command's output through it and get machine-parseable logs. `--parse-level` auto-detects ERROR/WARN/INFO prefixes from existing output. `--tag` labels records by pipeline stage so you can filter later.
problem: >
  A five-stage pipeline prints 10,000 lines of unstructured text. Stage 3 fails.
  There are no timestamps and no way to tell which stage produced which line.
  `echo "[$(date)] ERROR: ..."` adds inconsistent formatting that is hard to grep
  and impossible to aggregate.
before: |
  echo "[$(date)] INFO: Processing started"
  echo "[$(date)] ERROR: Connection failed"
  # inconsistent format, hard to parse, no machine-readable structure
after: "run-pipeline | vrk emit --tag pipeline --parse-level"
group: v1
category: utilities
example: "run-pipeline 2>&1 | vrk emit --tag deploy --parse-level"
flags:
  - flag: --level
    short: "-l"
    type: string
    description: "Log level: debug, info, warn, error"
  - flag: --tag
    short: ""
    type: string
    description: Value for the tag field on every record
  - flag: --msg
    short: ""
    type: string
    description: Fixed message override; stdin lines parsed as JSON and merged
  - flag: --parse-level
    short: ""
    type: bool
    description: Auto-detect level from ERROR/WARN/INFO/DEBUG line prefixes
exit_codes:
  - code: 0
    meaning: All non-empty lines emitted as JSONL records
  - code: 1
    meaning: Stdin scanner error or write failure
  - code: 2
    meaning: Interactive TTY with no positional arg, or unknown --level value
og_image:
  headline: "Structured logs. From any pipe."
  code: "vrk coax -- ./deploy.sh | vrk emit --tag deploy"
mcp_callable: true
