name: coax
tagline: retry wrapper - --times, --backoff, --on, --until
meta_description: "Retry flaky commands with exponential backoff. Wrap any pipeline stage to handle transient API failures."
meta_lead: "vrk coax retries a command with configurable backoff, buffering stdin so each attempt gets the same input."
og_title: "vrk coax - retry wrapper with backoff for flaky commands"
description: |
  `vrk coax` retries a command with configurable backoff. It buffers stdin so each attempt gets the same input. Fixed or exponential backoff, retry count caps, and exit-code filtering are all built in. It solves the three things bash retry loops always get wrong: stdin replay, backoff strategy, and retry limits.
problem: >
  A bash retry loop around a flaky API call works until the API starts returning
  500s. The loop hammers it with no backoff, making the outage worse. Stdin was
  consumed on the first attempt, so every retry sends empty input. The hardcoded
  `sleep 2` is either too aggressive or too conservative.
before: |
  for i in 1 2 3 4 5; do
    curl -sf https://api.example.com && break
    sleep $((i * 2))
  done
after: "vrk coax --times 5 --backoff exp:200ms -- curl -sf https://api.example.com"
group: v1
category: pipeline
example: "echo 'Summarize this' | vrk coax --times 5 --backoff exp:200ms -- vrk prompt"
flags:
  - flag: --times
    short: ""
    type: int
    description: Number of retries (total attempts = N+1)
  - flag: --backoff
    short: ""
    type: string
    description: "Delay between retries: 500ms for fixed, exp:100ms for exponential"
  - flag: --backoff-max
    short: ""
    type: duration
    description: Cap for exponential backoff; 0 means uncapped
  - flag: --on
    short: ""
    type: "[]int"
    description: Retry only on these exit codes; repeatable
  - flag: --until
    short: ""
    type: string
    description: Shell condition; retry while this exits non-zero
  - flag: --quiet
    short: "-q"
    type: bool
    description: Suppress retry progress lines
  - flag: --json
    short: "-j"
    type: bool
    description: Emit errors as JSON
exit_codes:
  - code: 0
    meaning: Command succeeded (first attempt or a retry)
  - code: 1
    meaning: All retries exhausted (last exit code from wrapped command)
  - code: 2
    meaning: Missing command after --, invalid --backoff spec
og_image:
  headline: "Retry flaky commands. With backoff."
  code: "vrk coax --times 5 --backoff exp:200ms -- curl -sf URL"
mcp_callable: false
