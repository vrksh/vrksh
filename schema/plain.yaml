name: plain
tagline: "Markdown stripper - removes syntax, keeps prose"
tier: utility
when_to_use: When you need plain text from markdown before token counting or LLM processing
hero_command: echo '## Hello **world**' | vrk plain
primary_output: Hello world
primary_context: reads from stdin or positional arg
avoid: Do not use for HTML stripping - plain handles markdown syntax, not raw HTML
contract:
  input: stdin
  output: stdout
  output_format: text
failure:
  exit_code: 2
  stderr_contains: "plain: no input: pipe markdown to stdin"
  example_command: vrk plain
mcp:
  callable: true
flags:
  - name: json
    default: "false"
    description: "Emit JSON object with text, input_bytes, output_bytes"
  - name: quiet
    default: "false"
    description: Suppress stderr output
examples:
  - title: Strip markdown to plain text
    command: echo '## Hello **world**' | vrk plain
    output: Hello world
    test: true
  - title: failure case
    command: vrk plain
    output: "usage error: plain: no input: pipe markdown to stdin"
    is_failure: true
before: |
  import re
  text = re.sub(r'[#*_`\[\]()]', '', markdown_text)
after: cat README.md | vrk plain
exit_codes:
  0: Success
  1: Could not read stdin or write stdout
  2: Interactive TTY with no piped input and no positional arg
related:
  - tok
  - grab
  - links
composable_with:
  - tok
  - prompt
  - grab
