name: plain
tagline: markdown stripper - removes syntax, keeps prose
description: |
  Strips markdown formatting and gives you plain prose. Headings, links, fences, and bullet markers are removed, but the actual text content is preserved. Useful before sending content to an LLM where formatting syntax wastes tokens.
problem: >
  You feed a markdown README to an LLM and waste tokens on formatting syntax -
  header markers, link URLs, fence markers, bullet characters. The content is the
  same but the token count is 20-30% higher than it needs to be.
before: |
  # no standard CLI tool for this
  python3 -c "
  import re, sys
  text = sys.stdin.read()
  text = re.sub(r'#{1,6}\s+', '', text)
  text = re.sub(r'\[([^\]]+)\]\([^\)]+\)', r'\1', text)
  print(text)" < README.md
after: "cat README.md | vrk plain"
group: v1
category: utilities
example: cat README.md | vrk plain | vrk tok --budget 4000
flags:
  - flag: --json
    short: "-j"
    type: bool
    description: Emit JSON with text, input_bytes, output_bytes
  - flag: --quiet
    short: "-q"
    type: bool
    description: Suppress stderr output
exit_codes:
  - code: 0
    meaning: Success
  - code: 1
    meaning: Could not read stdin or write stdout
  - code: 2
    meaning: Interactive TTY with no piped input and no positional arg
og_image:
  headline: "Strip markdown. Keep the prose."
  code: "cat README.md | vrk plain | vrk tok"
mcp_callable: true
