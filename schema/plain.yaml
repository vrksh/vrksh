name: plain
tagline: markdown stripper - removes syntax, keeps prose
meta_description: "Strip markdown syntax and keep the prose. Clean input for token counting or plain-text pipelines."
og_title: "vrk plain - strip markdown to plain text"
description: |
  You fetch a markdown document and send it to an LLM. The markdown syntax - headers, link URLs, code fences, bullet markers - consumes tokens but adds no information for the model. A 2,000-token document might be 1,400 tokens as plain text. Over hundreds of documents, that's real money.

  `vrk plain` strips markdown formatting and keeps only the prose. Headers become text, links keep their label but drop the URL, code blocks keep their content but lose the fences. The output is clean plain text ready for token-efficient LLM processing.
problem: >
  You process 500 markdown files through an LLM nightly. Each file has headers,
  links with long URLs, code fences, and bullet markers. All of that formatting
  is tokens the model reads but gains nothing from. You're paying for 30% more
  tokens than the actual content.
before: |
  cat README.md | sed 's/^#* //' | sed 's/\[([^]]*)\]([^)]*)/\1/g'
  # Fragile regex, misses code blocks, tables, nested formatting
after: "cat README.md | vrk plain"
group: v1
category: utilities
example: "vrk grab https://example.com/docs | vrk plain | vrk tok"
flags:
  - flag: --json
    short: "-j"
    type: bool
    description: Emit JSON with text, input_bytes, output_bytes
  - flag: --quiet
    short: "-q"
    type: bool
    description: Suppress stderr output
exit_codes:
  - code: 0
    meaning: Success
  - code: 1
    meaning: Could not read stdin or write stdout
  - code: 2
    meaning: Interactive TTY with no piped input and no positional arg
og_image:
  headline: "Strip markdown. Keep the prose."
  code: "cat README.md | vrk plain | vrk tok"
mcp_callable: true
