name: jwt
tagline: JWT inspector - decode, --claim, --expired, --valid.
meta_description: "Decode JWTs and extract claims from the command line. Check expiry, validate structure, pull fields."
og_title: "vrk jwt - JWT decoder and claim inspector"
description: |
  You need to check if a JWT is expired before making an API call. You paste it into jwt.io - a third-party website - and realize you just sent a production token to someone else's server. Or you base64-decode it manually and get the padding wrong.

  `vrk jwt` decodes JWT tokens locally, without sending them anywhere. It prints the payload as JSON, extracts individual claims with `--claim`, and checks expiry with `--expired` or full time validity with `--valid`. No signature verification - this is an inspection tool, not an auth library.
problem: >
  Your CI pipeline gets a 401 from an API. The token looks valid - it's a long
  base64 string. You paste it into jwt.io to debug. That token just went to a
  third-party server. You decode it manually with base64 and get the padding wrong.
  You add = characters until it works. Twenty minutes to find out the token expired
  two hours ago.
before: |
  echo "$TOKEN" | base64 -d 2>/dev/null | jq .
  # base64 padding errors, no expiry check
  # or worse: paste into jwt.io
after: "echo $TOKEN | vrk jwt --expired"
group: v1
category: utilities
example: "echo $TOKEN | vrk jwt --claim sub"
flags:
  - flag: --json
    short: "-j"
    type: bool
    description: Emit decoded token as JSON
  - flag: --claim
    short: "-c"
    type: string
    description: Print value of a single claim
  - flag: --expired
    short: "-e"
    type: bool
    description: Exit 1 if the token is expired
  - flag: --valid
    short: ""
    type: bool
    description: Exit 1 if expired, not-yet-valid, or issued in the future
  - flag: --quiet
    short: "-q"
    type: bool
    description: Suppress stderr output
exit_codes:
  - code: 0
    meaning: Success or token is valid
  - code: 1
    meaning: Token expired/invalid or runtime error
  - code: 2
    meaning: Usage error - bad format, too many args
og_image:
  headline: "Decode JWTs. Extract claims. Check expiry."
  code: "vrk jwt --expired --json < token.txt"
mcp_callable: true
