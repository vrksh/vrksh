name: jwt
tagline: JWT inspector - decode, --claim, --expired, --valid.
description: |
  Decodes JWT tokens and shows you what is inside - without sending them to a third-party website. You can extract a single claim, check whether the token is expired, or validate all time-based claims at once.
problem: >
  You have a JWT from an API response and need to check what is in it. You paste it
  into jwt.io (leaking the token to a third party) or write a Python one-liner that
  breaks on padding. You just want to see the claims.
before: |
  python3 -c "
  import base64, json, sys
  token = sys.argv[1].split('.')[1]
  token += '=' * (-len(token) % 4)
  print(json.dumps(json.loads(base64.urlsafe_b64decode(token)), indent=2))
  " eyJhbGciOi...
after: "vrk jwt eyJhbGciOi..."
group: v1
category: utilities
example: vrk jwt --claim sub eyJhbGciOiJIUzI1NiJ9...
flags:
  - flag: --json
    short: "-j"
    type: bool
    description: Emit decoded token as JSON
  - flag: --claim
    short: "-c"
    type: string
    description: Print value of a single claim
  - flag: --expired
    short: "-e"
    type: bool
    description: Exit 1 if the token is expired
  - flag: --valid
    short: ""
    type: bool
    description: Exit 1 if expired, not-yet-valid, or issued in the future
  - flag: --quiet
    short: "-q"
    type: bool
    description: Suppress stderr output
exit_codes:
  - code: 0
    meaning: Success or token is valid
  - code: 1
    meaning: Token expired/invalid or runtime error
  - code: 2
    meaning: Usage error - bad format, too many args
og_image:
  headline: "Decode JWTs. Extract claims. Check expiry."
  code: "vrk jwt --expired --json < token.txt"
mcp_callable: true
