name: grab
tagline: URL fetcher - clean markdown, plain text, or raw HTML.
meta_description: "Fetch any URL and get clean markdown back. No BeautifulSoup, no parsing scripts."
og_title: "vrk grab - fetch any URL as clean markdown"
description: |
  `vrk grab` fetches a URL and returns clean, readable markdown. Readability-style content extraction strips navigation, ads, scripts, and boilerplate. Use `--text` for plain prose or `--raw` for the unprocessed HTML. One command replaces curl + BeautifulSoup + custom extraction logic.
problem: >
  `curl` returns the full HTML of a page. A 52KB response contains 3KB of article
  content and 49KB of navigation, JavaScript, cookie banners, and ads. Feeding
  the raw HTML to an LLM wastes most of the context window on boilerplate.
  BeautifulSoup extracts content, but the selectors differ for every site.
before: |
  curl -s https://example.com/article | \
    python3 -c "
  from bs4 import BeautifulSoup
  import sys
  soup = BeautifulSoup(sys.stdin.read(), 'html.parser')
  print(soup.get_text())"
after: "vrk grab https://example.com/article"
group: v1
category: pipeline
example: "vrk grab https://blog.example.com/llm-best-practices | vrk tok"
flags:
  - flag: --text
    short: "-t"
    type: bool
    description: Plain prose output, no markdown syntax
  - flag: --raw
    short: ""
    type: bool
    description: Raw HTML, no processing
  - flag: --json
    short: "-j"
    type: bool
    description: Emit JSON envelope with metadata
  - flag: --quiet
    short: "-q"
    type: bool
    description: Suppress stderr output
exit_codes:
  - code: 0
    meaning: Success
  - code: 1
    meaning: HTTP error, fetch timeout, or I/O error
  - code: 2
    meaning: Usage error - invalid URL, no input, mutually exclusive flags
og_image:
  headline: "Fetch any URL. Get clean markdown back."
  code: "vrk grab https://example.com/article --json"
mcp_callable: true
