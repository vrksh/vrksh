name: grab
tagline: URL fetcher - clean markdown, plain text, or raw HTML.
meta_description: "Fetch any URL and get clean markdown back. No BeautifulSoup, no parsing scripts."
og_title: "vrk grab - fetch any URL as clean markdown"
description: |
  Fetches a web page and extracts the readable content as clean markdown. Strips navigation, ads, scripts, and boilerplate - you get the article text, not the page chrome. Also supports plain text and raw HTML output modes.
problem: >
  You need the content of a web page for an LLM pipeline. curl gives you raw HTML
  full of nav bars, ads, and scripts. You write a Python script with BeautifulSoup
  to extract the article text, and it breaks on the next site.
before: |
  curl -s https://example.com/article | \
    python3 -c "
  from bs4 import BeautifulSoup
  import sys
  soup = BeautifulSoup(sys.stdin.read(), 'html.parser')
  print(soup.get_text())"
after: "vrk grab https://example.com/article"
group: v1
category: pipeline
example: vrk grab --text https://example.com/article
flags:
  - flag: --text
    short: "-t"
    type: bool
    description: Plain prose output, no markdown syntax
  - flag: --raw
    short: ""
    type: bool
    description: Raw HTML, no processing
  - flag: --json
    short: "-j"
    type: bool
    description: Emit JSON envelope with metadata
  - flag: --quiet
    short: "-q"
    type: bool
    description: Suppress stderr output
exit_codes:
  - code: 0
    meaning: Success
  - code: 1
    meaning: HTTP error, fetch timeout, or I/O error
  - code: 2
    meaning: Usage error - invalid URL, no input, mutually exclusive flags
og_image:
  headline: "Fetch any URL. Get clean markdown back."
  code: "vrk grab https://example.com/article --json"
mcp_callable: true
