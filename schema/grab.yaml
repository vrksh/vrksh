name: grab
tagline: URL fetcher - clean markdown, plain text, or raw HTML.
meta_description: "Fetch any URL and get clean markdown back. No BeautifulSoup, no parsing scripts."
og_title: "vrk grab - fetch any URL as clean markdown"
description: |
  You need the text of a web page for an LLM pipeline. You curl the URL and get 47KB of HTML - navigation bars, ad scripts, cookie banners, tracking pixels, and somewhere buried in the middle, the 2KB article you actually wanted. You write a Python script with BeautifulSoup. It works on one site. The next site uses different class names.

  `vrk grab` fetches any URL and returns clean, readable markdown. It applies Readability-style content extraction to strip navigation, ads, scripts, and boilerplate. Use `--text` for plain prose with no formatting, or `--raw` for the unprocessed HTML. One command replaces curl + BeautifulSoup + custom extraction logic.
problem: >
  You curl a documentation page to feed to an LLM for summarization. The HTML
  is 52KB. The actual article content is 3KB. The other 49KB is navigation,
  JavaScript, CSS, footers, and cookie consent dialogs. Your LLM wastes most
  of its context window on boilerplate and returns a summary of the navigation menu.
before: |
  curl -s https://example.com/article | \
    python3 -c "
  from bs4 import BeautifulSoup
  import sys
  soup = BeautifulSoup(sys.stdin.read(), 'html.parser')
  print(soup.get_text())"
after: "vrk grab https://example.com/article"
group: v1
category: pipeline
example: "vrk grab https://blog.example.com/llm-best-practices | vrk tok"
flags:
  - flag: --text
    short: "-t"
    type: bool
    description: Plain prose output, no markdown syntax
  - flag: --raw
    short: ""
    type: bool
    description: Raw HTML, no processing
  - flag: --json
    short: "-j"
    type: bool
    description: Emit JSON envelope with metadata
  - flag: --quiet
    short: "-q"
    type: bool
    description: Suppress stderr output
exit_codes:
  - code: 0
    meaning: Success
  - code: 1
    meaning: HTTP error, fetch timeout, or I/O error
  - code: 2
    meaning: Usage error - invalid URL, no input, mutually exclusive flags
og_image:
  headline: "Fetch any URL. Get clean markdown back."
  code: "vrk grab https://example.com/article --json"
mcp_callable: true
