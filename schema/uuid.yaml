name: uuid
tagline: UUID generator - v4/v7, --count, --json
description: |
  Generates UUIDs - v4 (random) or v7 (time-ordered). v7 UUIDs sort by creation time, which makes them useful as database primary keys that stay roughly ordered. Consistent output format across macOS and Linux.
problem: >
  You need a UUID and uuidgen is not installed, or it only generates v4 and you need
  v7 for time-ordered database keys. Python's uuid module does not support v7.
  The uuidgen output format varies across platforms.
before: |
  uuidgen
  # macOS: uppercase, Linux: lowercase
  # no v7 support on either platform
  # python3 -c "import uuid; print(uuid.uuid4())" for portable v4
after: "vrk uuid --v7"
group: v1
category: utilities
example: vrk uuid --v7
flags:
  - flag: --v7
    short: ""
    type: bool
    description: Generate a v7 (time-ordered) UUID instead of v4
  - flag: --count
    short: "-n"
    type: int
    description: Number of UUIDs to generate
  - flag: --json
    short: "-j"
    type: bool
    description: Emit JSON with uuid, version, generated_at
  - flag: --quiet
    short: "-q"
    type: bool
    description: Suppress stderr output
exit_codes:
  - code: 0
    meaning: Success
  - code: 1
    meaning: Runtime error (generation failure)
  - code: 2
    meaning: --count less than 1, unknown flag
og_image:
  headline: "Generate UUIDs. v4 random, v7 time-ordered."
  code: "vrk uuid --v7 --count 10"
mcp_callable: true
