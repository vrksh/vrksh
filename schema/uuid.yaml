name: uuid
tagline: UUID generator - v4/v7, --count, --json
meta_description: "Generate UUIDs from the command line. v4 random or v7 time-sorted. Batch with --count."
og_title: "vrk uuid - UUID v4 and v7 generator"
description: |
  You need a unique ID for a database row, a batch run, or a file name. `uuidgen` exists on macOS but not everywhere. It only generates v4. You need v7 (time-ordered) for database primary keys that sort by creation time, and `uuidgen` can't do that.

  `vrk uuid` generates v4 (random) or v7 (time-ordered) UUIDs with consistent output across macOS and Linux. Use `--v7` for database keys that sort chronologically. Use `--count` to generate multiple UUIDs in one call.
problem: >
  You generate UUIDs for database rows with uuidgen. Your queries are slow because
  B-tree indexes fragment on random v4 UUIDs. You read about v7 UUIDs that sort
  by creation time. Your system uuidgen doesn't support v7. You pull in a Python
  dependency for one function.
before: |
  uuidgen  # v4 only, macOS only, no batch mode
  # Need v7? Install Python + uuid7 package
after: "vrk uuid --v7"
group: v1
category: utilities
example: "vrk uuid --v7 --count 5"
flags:
  - flag: --v7
    short: ""
    type: bool
    description: Generate a v7 (time-ordered) UUID instead of v4
  - flag: --count
    short: "-n"
    type: int
    description: Number of UUIDs to generate
  - flag: --json
    short: "-j"
    type: bool
    description: Emit JSON with uuid, version, generated_at
  - flag: --quiet
    short: "-q"
    type: bool
    description: Suppress stderr output
exit_codes:
  - code: 0
    meaning: Success
  - code: 1
    meaning: Runtime error (generation failure)
  - code: 2
    meaning: --count less than 1, unknown flag
og_image:
  headline: "Generate UUIDs. v4 random, v7 time-ordered."
  code: "vrk uuid --v7 --count 10"
mcp_callable: true
