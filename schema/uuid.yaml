name: uuid
tagline: UUID generator - v4/v7, --count, --json
meta_description: "Generate UUIDs from the command line. v4 random or v7 time-sorted. Batch with --count."
meta_lead: "vrk uuid generates v4 (random) or v7 (time-ordered) UUIDs with consistent output across platforms."
og_title: "vrk uuid - UUID v4 and v7 generator"
description: |
  `vrk uuid` generates v4 (random) or v7 (time-ordered) UUIDs with consistent output across macOS and Linux. v7 UUIDs sort by creation time, which keeps B-tree indexes compact. `--count` generates batches in one call.
problem: >
  `uuidgen` generates v4 UUIDs, which fragment B-tree indexes because they are
  random. v7 UUIDs sort by creation time and fix this, but `uuidgen` does not
  support v7. It also does not exist on all platforms and has no batch mode.
before: |
  uuidgen  # v4 only, macOS only, no batch mode
  # Need v7? Install Python + uuid7 package
after: "vrk uuid --v7"
group: v1
category: utilities
example: "vrk uuid --v7 --count 5"
flags:
  - flag: --v7
    short: ""
    type: bool
    description: Generate a v7 (time-ordered) UUID instead of v4
  - flag: --count
    short: "-n"
    type: int
    description: Number of UUIDs to generate
  - flag: --json
    short: "-j"
    type: bool
    description: Emit JSON with uuid, version, generated_at
  - flag: --quiet
    short: "-q"
    type: bool
    description: Suppress stderr output
exit_codes:
  - code: 0
    meaning: Success
  - code: 1
    meaning: Runtime error (generation failure)
  - code: 2
    meaning: --count less than 1, unknown flag
og_image:
  headline: "Generate UUIDs. v4 random, v7 time-ordered."
  code: "vrk uuid --v7 --count 10"
mcp_callable: true
