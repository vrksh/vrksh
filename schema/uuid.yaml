name: uuid
tagline: UUID generator - v4/v7, --count, --json
description: |
  Generate v4 (random) or v7 (time-ordered) UUIDs. v7 UUIDs sort
  lexicographically by creation time for database primary keys.
  Batch generation with --count, structured output with --json.
group: v1
example: vrk uuid --v7
flags:
  - flag: --v7
    short: ""
    type: bool
    description: Generate a v7 (time-ordered) UUID instead of v4
  - flag: --count
    short: "-n"
    type: int
    description: Number of UUIDs to generate
  - flag: --json
    short: "-j"
    type: bool
    description: Emit JSON with uuid, version, generated_at
  - flag: --quiet
    short: "-q"
    type: bool
    description: Suppress stderr output
exit_codes:
  - code: 0
    meaning: Success
  - code: 1
    meaning: Runtime error (generation failure)
  - code: 2
    meaning: --count less than 1, unknown flag
og_image:
  headline: "Generate UUIDs. v4 random, v7 time-ordered."
  code: "vrk uuid --v7 --count 10"
mcp_callable: true
