<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>{{ if .IsHome }}vrksh - Unix tools for the agent era{{ else }}{{ with .Params.meta_title }}{{ . }} | vrksh{{ else }}{{ .Title }} - vrksh{{ end }}{{ end }}</title>
<meta name="description" content="{{ with .Description }}{{ . }}{{ else }}{{ .Site.Params.description }}{{ end }}">

<!-- Google Fonts -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Urbanist:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">

<!-- Tailwind CSS -->
<link rel="stylesheet" href="/css/main.css">

<!-- Syntax highlighting -->
<link rel="stylesheet" href="/css/prism-vrk.css">

<!-- OG tags -->
<meta property="og:title" content="{{ if .IsHome }}vrksh - Unix tools for the agent era{{ else }}{{ with .Params.og_title }}{{ . }}{{ else }}{{ .Title }} - vrksh{{ end }}{{ end }}">
<meta property="og:description" content="{{ with .Description }}{{ . }}{{ else }}{{ .Site.Params.description }}{{ end }}">
<meta property="og:type" content="{{ if .IsPage }}article{{ else }}website{{ end }}">
<meta property="og:url" content="{{ .Permalink }}">
{{ if .Params.tool -}}
<meta property="og:image" content="{{ .Site.BaseURL }}og/{{ .Params.tool }}.png">
{{- else if and .File (eq .File.ContentBaseName "install") -}}
<meta property="og:image" content="{{ .Site.BaseURL }}og/install.png">
{{- else -}}
<meta property="og:image" content="{{ .Site.BaseURL }}og/default.png">
{{- end }}
<meta name="twitter:card" content="summary_large_image">

<!-- Favicon -->
<link rel="icon" type="image/x-icon" href="/favicon.ico">
<link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
<link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
<link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
<link rel="icon" type="image/png" sizes="192x192" href="/android-chrome-192x192.png">
<link rel="manifest" href="/site.webmanifest">
